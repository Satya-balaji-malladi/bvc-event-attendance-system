<script>
/**
 * Enterprise Dashboard JavaScript
 * Handles initialization, DOM manipulation, and frontend logic.
 * Integrates directly with the backend via google.script.run
 */

// Call initializeDashboard directly because DOMContentLoaded has already fired in the App Shell SPA
initializeDashboard();

/**
 * Initializes all dashboard components
 */
function initializeDashboard() {
  updateClock();
  setInterval(updateClock, 60000); // Update time every minute
  
  // Load real data
  loadDashboardData();
  
  // Initialize search input behavior
  const searchInput = document.getElementById('eventSearchInput');
  if (searchInput) {
    searchInput.addEventListener('keyup', function(e) {
      if (e.key === 'Enter') {
        showToast('Search feature is coming soon.', 'info');
      }
    });
  }
}

/**
 * Updates the current date and time display in the header
 */
function updateClock() {
  const clockEl = document.getElementById('currentDateTime');
  if (!clockEl) return;
  
  const now = new Date();
  const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
  clockEl.innerHTML = `<i class="bi bi-clock me-1"></i> ${now.toLocaleDateString('en-US', options)}`;
}

/**
 * Main function to load all dashboard panels using google.script.run
 */
function loadDashboardData() {
  showLoader();
  
  const sessionToken = localStorage.getItem('sessionToken');
  
  if (!sessionToken) {
    hideLoader();
    showToast('Session expired. Please log in again.', 'danger');
    console.warn("Dashboard Fetch Failed: sessionToken not found in localStorage.");
    return;
  }

  console.log("Fetching dashboard data with token:", sessionToken);

  google.script.run
    .withSuccessHandler(function(response) {
      console.log("Backend Response Received:", response);
      if (response && response.success && response.data) {
        console.log("DASHBOARD_MODULE | STEP 8 - Rendering UI");
        updateStatsUI(response.data.stats);
        loadActivitiesUI(response.data.recentActivities);
        loadEventsUI(response.data.activeEvents);
        console.log("DASHBOARD_MODULE | STEP 9 - Render completed");
      } else {
        console.error("Failed to load dashboard stats. Response structure invalid:", response);
        showToast('Error loading dashboard data.', 'danger');
      }
      hideLoader();
    })
    .withFailureHandler(function(err) {
      console.error("Google Script Run Error:", err);
      hideLoader();
      showToast('Error communicating with server.', 'danger');
    })
    .getDashboardData(sessionToken);
}

/**
 * Refreshes the dashboard data (triggered by manual refresh button)
 */
function refreshDashboard() {
  loadDashboardData();
}

/**
 * Populates Quick Stats with real data
 */
function updateStatsUI(stats) {
  console.log("===== DASHBOARD STATS =====");
console.log(JSON.stringify(stats, null, 2));
  if (!stats) return;
  console.log("Updating Stats UI:", stats);
  
  const totalUsersEl = document.getElementById('totalUsers');
  const activeEventsEl = document.getElementById('activeEvents');
  const todayAttendanceEl = document.getElementById('todayAttendance');
  const totalDepartmentsEl = document.getElementById('totalDepartments');

  if (totalUsersEl) totalUsersEl.textContent = stats.totalCoordinators !== undefined ? stats.totalCoordinators : '-';
  // Fallback to totalEvents if activeEvents is undefined
  if (activeEventsEl) activeEventsEl.textContent = stats.activeEvents !== undefined ? stats.activeEvents : (stats.totalEvents !== undefined ? stats.totalEvents : '-');
  if (todayAttendanceEl) todayAttendanceEl.textContent = stats.todayAttendance !== undefined ? stats.todayAttendance : '-';
  if (totalDepartmentsEl) totalDepartmentsEl.textContent = stats.totalDepartments !== undefined ? stats.totalDepartments : '-';
}

/**
 * Populates Recent Activities Timeline
 */
function loadActivitiesUI(activities) {
  const timelineEl = document.getElementById('recentActivityList');
  if (!timelineEl) return;
  
  if (!activities || activities.length === 0) {
    timelineEl.innerHTML = '<li class="timeline-item"><div class="timeline-content"><p>No recent activity found.</p></div></li>';
    return;
  }
  
  let html = '';
  activities.forEach(act => {
    // Enhanced dynamic fallback for keys matching CONFIG.COLUMNS or raw log fields
    const action = act['Action'] || act.action || act['Log Action'] || 'Action';
    const module = act['Module'] || act.module || act['Log Module'] || 'System';
    const desc = act['Description'] || act.description || act['Remarks'] || '';
    const ts = act['Timestamp'] || act.timestamp || act['Created At'] || new Date().getTime();
    
    let type = 'info';
    if (action.toLowerCase().includes('create') || action.toLowerCase().includes('success') || action.toLowerCase().includes('login')) type = 'success';
    if (action.toLowerCase().includes('delete') || action.toLowerCase().includes('fail') || action.toLowerCase().includes('error')) type = 'danger';
    if (action.toLowerCase().includes('warn')) type = 'warning';

    const timeStr = new Date(ts).toLocaleString();

    html += `
      <li class="timeline-item">
        <div class="timeline-marker ${type}"></div>
        <div class="timeline-content">
          <h6 class="timeline-title">${module} - ${action}</h6>
          <span class="timeline-time"><i class="bi bi-clock me-1"></i>${timeStr}</span>
          <p class="timeline-desc">${desc}</p>
        </div>
      </li>
    `;
  });
  
  timelineEl.innerHTML = html;
}

/**
 * Populates Active Events Table
 */
function loadEventsUI(events) {
  const tbody = document.getElementById('activeEventsTableBody');
  if (!tbody) return;
  
  if (!events || events.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No active events found.</td></tr>';
    return;
  }
  
  let html = '';
  events.forEach(evt => {
    // Safe mapping supporting both Sheet Headers and Object properties from Config.gs
    const name = evt['Event Name'] || evt.eventName || 'Unnamed Event';
    const dept = evt['Department'] || evt['Departments'] || evt.department || 'General';
    const coord = evt['Organizer'] || evt['Coordinator ID'] || evt.coordinatorId || 'Unknown';
    const date = evt['Start Date'] || evt.startDate || '';
    const status = evt['Event Status'] || evt['Status'] || evt.status || 'Active';
    
    let statusClass = 'badge-active';
    if (status.toLowerCase() === 'upcoming') statusClass = 'badge-upcoming';
    if (status.toLowerCase() === 'completed') statusClass = 'badge-completed';

    html += `
      <tr>
        <td class="fw-semibold">${name}</td>
        <td>${dept}</td>
        <td>${coord}</td>
        <td>${date}</td>
        <td><span class="badge badge-enterprise ${statusClass}">${status}</span></td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-primary" aria-label="View Details" onclick="showToast('View details coming soon', 'info')"><i class="bi bi-eye"></i></button>
        </td>
      </tr>
    `;
  });
  
  tbody.innerHTML = html;
}

/**
 * Utility: Shows the full-screen loader
 */
function showLoader() {
  const loader = document.getElementById('dashboardLoader');
  if (loader) loader.classList.remove('d-none');
}

/**
 * Utility: Hides the full-screen loader
 */
function hideLoader() {
  const loader = document.getElementById('dashboardLoader');
  if (loader) loader.classList.add('d-none');
}

/**
 * Utility: Shows a Bootstrap Toast notification
 */
function showToast(message, type = 'primary') {
  const toastEl = document.getElementById('dashboardToast');
  const toastBody = document.getElementById('dashboardToastMessage');
  
  if (!toastEl || !toastBody) return;
  
  toastEl.className = 'toast align-items-center text-white border-0';
  
  let bgClass = 'bg-primary';
  if (type === 'success') bgClass = 'bg-success';
  if (type === 'danger') bgClass = 'bg-danger';
  if (type === 'warning') bgClass = 'bg-warning text-dark';
  if (type === 'info') bgClass = 'bg-info text-dark';
  
  toastEl.classList.add(bgClass);
  
  const closeBtn = toastEl.querySelector('.btn-close');
  if (type === 'warning' || type === 'info') {
    toastEl.classList.remove('text-white');
    if (closeBtn) closeBtn.classList.remove('btn-close-white');
  } else {
    if (closeBtn) closeBtn.classList.add('btn-close-white');
  }
  
  toastBody.textContent = message;
  
  if (typeof bootstrap !== 'undefined') {
    const bsToast = new bootstrap.Toast(toastEl, { delay: 3000 });
    bsToast.show();
  } else {
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 3000);
  }
}

/**
 * Utility: Triggers a reusable confirmation modal
 */
function confirmAction(message, onConfirm) {
  const modalEl = document.getElementById('confirmModal');
  const bodyEl = document.getElementById('confirmModalBody');
  const confirmBtn = document.getElementById('confirmModalBtn');
  
  if (!modalEl || !bodyEl || !confirmBtn) {
    if (window.confirm(message)) {
      if (typeof onConfirm === 'function') onConfirm();
    }
    return;
  }
  
  bodyEl.textContent = message;
  
  const newBtn = confirmBtn.cloneNode(true);
  confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
  
  newBtn.addEventListener('click', function() {
    if (typeof bootstrap !== 'undefined') {
      const bsModal = bootstrap.Modal.getInstance(modalEl);
      if (bsModal) bsModal.hide();
    }
    if (typeof onConfirm === 'function') onConfirm();
  });
  
  if (typeof bootstrap !== 'undefined') {
    const bsModal = new bootstrap.Modal(modalEl);
    bsModal.show();
  }
}
</script>

<script>
/**
 * ==========================================
 * USERS MODULE
 * ==========================================
 */
console.log("Users Module Registered");
App.Modules.users = {
  usersData: [],
  userModalInstance: null,
  
  init: function() {
    console.log("Users Init");
    App.Logger.info('Users init');
    this.bindEvents();
    this.load();
  },
  
  load: function() {
    console.log("Users Load");
    const tbody = document.getElementById('users-table-body');
    if (tbody) tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-5"><div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>Loading users...</td></tr>';
    
    App.API.getAllUsers()
      .then(users => {
        // Safe mapping to handle capitalization or mismatched properties
        const mappedUsers = (users || []).map(u => ({
          ...u,
          user_id: u.user_id || u.UserID || u.userId || u.id || 'N/A',
          full_name: u.full_name || u.FullName || u.fullName || u.name || 'N/A',
          email: u.email || u.Email || 'N/A',
          role: u.role || u.Role || 'N/A',
          department: u.department || u.Department || u.dept || 'N/A',
          status: u.status || u.Status || 'N/A'
        }));
        
        this.usersData = mappedUsers;
        this.populateDepartmentFilter();
        this.applyFilters();
      })
      .catch(err => {
        if (tbody) tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger py-5">Failed to load users</td></tr>';
        App.ErrorHandler.handle(err, "Failed to load users in Users module");
      });
  },

  bindEvents: function() {
    const searchInput = document.getElementById('users-search-input');
    const roleFilter = document.getElementById('users-role-filter');
    const deptFilter = document.getElementById('users-dept-filter');
    const statusFilter = document.getElementById('users-status-filter');

    if (searchInput) searchInput.addEventListener('input', () => this.applyFilters());
    if (roleFilter) roleFilter.addEventListener('change', () => this.applyFilters());
    if (deptFilter) deptFilter.addEventListener('change', () => this.applyFilters());
    if (statusFilter) statusFilter.addEventListener('change', () => this.applyFilters());

    const addUserBtn = document.querySelector('button[data-action="add-user"]');
    if (addUserBtn) {
      addUserBtn.addEventListener('click', () => this.openAddUserModal());
    }

    const userForm = document.getElementById('userForm');
    if (userForm) {
      userForm.addEventListener('submit', (e) => this.handleUserSubmit(e));
    }
    
    const tbody = document.getElementById('users-table-body');
    if (tbody) {
      tbody.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');
        
        if (action === 'view-user') this.openViewUserModal(id);
        else if (action === 'edit-user') this.openEditUserModal(id);
        else if (action === 'delete-user') this.openDeleteUserModal(id);
        else if (action === 'reset-pwd-user') this.openResetPasswordModal(id);
      });
    }
    
    const confirmDeleteBtn = document.getElementById('userConfirmDeleteBtn');
    if (confirmDeleteBtn) {
      confirmDeleteBtn.addEventListener('click', () => this.handleDeleteUser());
    }
    
    const confirmResetBtn = document.getElementById('userConfirmResetBtn');
    if (confirmResetBtn) {
      confirmResetBtn.addEventListener('click', () => this.handleResetPassword());
    }
  },

  openAddUserModal: function() {
    const form = document.getElementById('userForm');
    if (form) {
      form.reset();
      form.classList.remove('was-validated');
      
      // Reset disabled states
      Array.from(form.elements).forEach(el => {
        if (el.tagName === 'INPUT' || el.tagName === 'SELECT') {
          el.disabled = false;
          el.readOnly = false;
        }
      });
    }
    
    document.getElementById('userOriginalId').value = '';
    document.getElementById('userModalLabel').textContent = 'Add User';
    
    // Show/hide fields
    document.getElementById('userIdGroup').classList.add('d-none');
    document.getElementById('userUsernameGroup').classList.add('d-none');
    document.getElementById('userCreatedAtGroup').classList.add('d-none');
    
    // Show the User ID input field for new users
    const customIdField = document.getElementById('userCustomId');
    if (customIdField) {
      customIdField.value = '';
      customIdField.disabled = false;
    }
    
    const pwdGroup = document.getElementById('userPasswordGroup');
    const confirmPwdGroup = document.getElementById('userConfirmPasswordGroup');
    pwdGroup.classList.remove('d-none');
    confirmPwdGroup.classList.remove('d-none');
    
    document.getElementById('userPassword').setAttribute('required', 'true');
    document.getElementById('userConfirmPassword').setAttribute('required', 'true');
    
    const saveBtn = document.getElementById('userSaveBtn');
    if (saveBtn) {
      saveBtn.classList.remove('d-none');
      document.getElementById('userSaveBtnText').textContent = 'Save User';
    }
    
    const errorAlert = document.getElementById('userModalError');
    if (errorAlert) errorAlert.classList.add('d-none');
    
    if (!this.userModalInstance) {
      const modalEl = document.getElementById('userModal');
      if (modalEl) {
        this.userModalInstance = new bootstrap.Modal(modalEl);
      }
    }
    
    if (this.userModalInstance) {
      this.userModalInstance.show();
    }
  },

  openViewUserModal: function(userId) {
    const user = this.usersData.find(u => String(u.user_id) === String(userId));
    if (!user) return;
    
    const form = document.getElementById('userForm');
    if (form) {
      form.reset();
      form.classList.remove('was-validated');
    }
    
    document.getElementById('userModalLabel').textContent = 'View User';
    
    document.getElementById('userOriginalId').value = user.user_id;
    document.getElementById('userIdDisplay').value = user.user_id;
    document.getElementById('userUsername').value = user.username || 'N/A';
    document.getElementById('userName').value = user.full_name || '';
    document.getElementById('userEmail').value = user.email || '';
    document.getElementById('userDepartment').value = user.department || '';
    document.getElementById('userRole').value = user.role || '';
    document.getElementById('userStatus').value = user.status || '';
    document.getElementById('userCreatedAt').value = user.created_at || user.CreatedAt || user.createdAt || 'N/A';
    
    document.getElementById('userIdGroup').classList.remove('d-none');
    document.getElementById('userUsernameGroup').classList.remove('d-none');
    document.getElementById('userCreatedAtGroup').classList.remove('d-none');
    
    const pwdGroup = document.getElementById('userPasswordGroup');
    const confirmPwdGroup = document.getElementById('userConfirmPasswordGroup');
    pwdGroup.classList.add('d-none');
    confirmPwdGroup.classList.add('d-none');
    
    document.getElementById('userPassword').removeAttribute('required');
    document.getElementById('userConfirmPassword').removeAttribute('required');
    
    const saveBtn = document.getElementById('userSaveBtn');
    if (saveBtn) saveBtn.classList.add('d-none');
    
    const errorAlert = document.getElementById('userModalError');
    if (errorAlert) errorAlert.classList.add('d-none');
    
    // Disable all inputs
    Array.from(form.elements).forEach(el => {
      if (el.tagName === 'INPUT' || el.tagName === 'SELECT') {
        el.disabled = true;
      }
    });
    
    if (!this.userModalInstance) {
      const modalEl = document.getElementById('userModal');
      if (modalEl) this.userModalInstance = new bootstrap.Modal(modalEl);
    }
    
    if (this.userModalInstance) {
      this.userModalInstance.show();
    }
  },

  openEditUserModal: function(userId) {
    const user = this.usersData.find(u => String(u.user_id) === String(userId));
    if (!user) return;
    
    const form = document.getElementById('userForm');
    if (form) {
      form.reset();
      form.classList.remove('was-validated');
      
      // Reset disabled states for editable fields
      Array.from(form.elements).forEach(el => {
        if (el.tagName === 'INPUT' || el.tagName === 'SELECT') {
          el.disabled = false;
          el.readOnly = false;
        }
      });
    }
    
    document.getElementById('userModalLabel').textContent = 'Edit User';
    
    document.getElementById('userOriginalId').value = user.user_id;
    
    // User ID field - read-only for edit
    const customIdField = document.getElementById('userCustomId');
    if (customIdField) {
      customIdField.value = user.user_id || '';
      customIdField.readOnly = true;
      customIdField.disabled = true;
    }
    
    // Read-only fields
    const idDisplay = document.getElementById('userIdDisplay');
    idDisplay.value = user.user_id;
    idDisplay.readOnly = true;
    idDisplay.disabled = true;
    
    const usernameDisplay = document.getElementById('userUsername');
    usernameDisplay.value = user.username || 'N/A';
    usernameDisplay.readOnly = true;
    usernameDisplay.disabled = true;
    
    const createdDisplay = document.getElementById('userCreatedAt');
    createdDisplay.value = user.created_at || user.CreatedAt || user.createdAt || 'N/A';
    createdDisplay.readOnly = true;
    createdDisplay.disabled = true;
    
    // Editable fields
    document.getElementById('userName').value = user.full_name || '';
    document.getElementById('userEmail').value = user.email || '';
    document.getElementById('userDepartment').value = user.department || '';
    document.getElementById('userRole').value = user.role || '';
    document.getElementById('userStatus').value = user.status || '';
    
    const roleSelect = document.getElementById('userRole');
    if (App.State && App.State.currentUser && String(App.State.currentUser.user_id) === String(userId)) {
      roleSelect.disabled = true;
    } else {
      roleSelect.disabled = false;
    }
    
    document.getElementById('userIdGroup').classList.remove('d-none');
    document.getElementById('userUsernameGroup').classList.remove('d-none');
    document.getElementById('userCreatedAtGroup').classList.remove('d-none');
    
    const pwdGroup = document.getElementById('userPasswordGroup');
    const confirmPwdGroup = document.getElementById('userConfirmPasswordGroup');
    pwdGroup.classList.add('d-none');
    confirmPwdGroup.classList.add('d-none');
    
    document.getElementById('userPassword').removeAttribute('required');
    document.getElementById('userConfirmPassword').removeAttribute('required');
    
    const saveBtn = document.getElementById('userSaveBtn');
    if (saveBtn) {
      saveBtn.classList.remove('d-none');
      document.getElementById('userSaveBtnText').textContent = 'Update User';
    }
    
    const errorAlert = document.getElementById('userModalError');
    if (errorAlert) errorAlert.classList.add('d-none');
    
    if (!this.userModalInstance) {
      const modalEl = document.getElementById('userModal');
      if (modalEl) this.userModalInstance = new bootstrap.Modal(modalEl);
    }
    
    if (this.userModalInstance) {
      this.userModalInstance.show();
    }
  },

  openDeleteUserModal: function(userId) {
    if (App.State && App.State.currentUser && String(App.State.currentUser.user_id) === String(userId)) {
      App.UI.showError("You cannot delete your own account.");
      return;
    }
    
    document.getElementById('userDeleteId').value = userId;
    const modalEl = document.getElementById('userDeleteModal');
    if (modalEl) {
      const modal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
      modal.show();
    }
  },

  openResetPasswordModal: function(userId) {
    document.getElementById('userResetId').value = userId;
    const modalEl = document.getElementById('userResetModal');
    if (modalEl) {
      const modal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
      modal.show();
    }
  },

  handleUserSubmit: function(e) {
    e.preventDefault();
    const form = e.target;
    
    const originalId = document.getElementById('userOriginalId').value;
    const isEdit = !!originalId;
    
    // Custom validation for passwords matching (only if not editing)
    if (!isEdit) {
      const pwd = document.getElementById('userPassword').value;
      const confirmPwd = document.getElementById('userConfirmPassword').value;
      const confirmInput = document.getElementById('userConfirmPassword');
      
      if (pwd !== confirmPwd) {
        confirmInput.setCustomValidity("Passwords do not match");
      } else {
        confirmInput.setCustomValidity("");
      }
    }
    
    if (!form.checkValidity()) {
      e.stopPropagation();
      form.classList.add('was-validated');
      return;
    }
    
    // Pass validation, submit
    console.log("FRONTEND STEP 1: handleUserSubmit triggered");
    this.setModalLoading(true);
    
    const emailVal = document.getElementById('userEmail').value.trim();
    const userCustomId = document.getElementById('userCustomId').value.trim();
    const userData = {
      full_name: document.getElementById('userName').value.trim(),
      email: emailVal,
      department: document.getElementById('userDepartment').value,
      role: document.getElementById('userRole').value,
      status: document.getElementById('userStatus').value,
      user_id: userCustomId
    };
    
    if (!isEdit) {
      userData.username = emailVal.split('@')[0];
      userData.password = document.getElementById('userPassword').value;
    }
    
    if (isEdit) {
      console.log("FRONTEND STEP 2: App.API.updateUser called with:", userData);
      App.API.updateUser(originalId, userData)
        .then(res => {
          this.setModalLoading(false);
          if (this.userModalInstance) this.userModalInstance.hide();
          App.UI.showSuccess("User updated successfully!");
          this.load();
        })
        .catch(err => {
          this.setModalLoading(false);
          const errorAlert = document.getElementById('userModalError');
          if (errorAlert) {
            errorAlert.textContent = err.message || "Failed to update user.";
            errorAlert.classList.remove('d-none');
          }
          App.UI.showError(err.message || "Failed to update user.");
        });
    } else {
      console.log("FRONTEND STEP 2: App.API.createUser called with:", userData);
      App.API.createUser(userData)
        .then(res => {
          this.setModalLoading(false);
          if (this.userModalInstance) this.userModalInstance.hide();
          App.UI.showSuccess("User created successfully!");
          this.load();
        })
        .catch(err => {
          this.setModalLoading(false);
          const errorAlert = document.getElementById('userModalError');
          if (errorAlert) {
            errorAlert.textContent = err.message || "Failed to create user.";
            errorAlert.classList.remove('d-none');
          }
          App.UI.showError(err.message || "Failed to create user.");
        });
    }
  },

  handleDeleteUser: function() {
    const userId = document.getElementById('userDeleteId').value;
    if (!userId) return;
    
    const btn = document.getElementById('userConfirmDeleteBtn');
    const spinner = document.getElementById('userDeleteSpinner');
    if (btn) btn.disabled = true;
    if (spinner) spinner.classList.remove('d-none');
    
    App.API.deleteUser(userId)
      .then(() => {
        if (btn) btn.disabled = false;
        if (spinner) spinner.classList.add('d-none');
        
        const modalEl = document.getElementById('userDeleteModal');
        if (modalEl) {
          const modal = bootstrap.Modal.getInstance(modalEl);
          if (modal) modal.hide();
        }
        App.UI.showSuccess("User deleted successfully!");
        this.load();
      })
      .catch(err => {
        if (btn) btn.disabled = false;
        if (spinner) spinner.classList.add('d-none');
        App.UI.showError(err.message || "Failed to delete user.");
      });
  },

  handleResetPassword: function() {
    const userId = document.getElementById('userResetId').value;
    if (!userId) return;
    
    const btn = document.getElementById('userConfirmResetBtn');
    const spinner = document.getElementById('userResetSpinner');
    if (btn) btn.disabled = true;
    if (spinner) spinner.classList.remove('d-none');
    
    App.API.resetPassword(userId)
      .then(() => {
        if (btn) btn.disabled = false;
        if (spinner) spinner.classList.add('d-none');
        
        const modalEl = document.getElementById('userResetModal');
        if (modalEl) {
          const modal = bootstrap.Modal.getInstance(modalEl);
          if (modal) modal.hide();
        }
        App.UI.showSuccess("Password reset successfully!");
        this.load();
      })
      .catch(err => {
        if (btn) btn.disabled = false;
        if (spinner) spinner.classList.add('d-none');
        App.UI.showError(err.message || "Failed to reset password.");
      });
  },

  setModalLoading: function(isLoading) {
    const btn = document.getElementById('userSaveBtn');
    const spinner = document.getElementById('userSaveSpinner');
    if (!btn || !spinner) return;
    
    btn.disabled = isLoading;
    if (isLoading) {
      spinner.classList.remove('d-none');
    } else {
      spinner.classList.add('d-none');
    }
  },

  populateDepartmentFilter: function() {
    const deptFilter = document.getElementById('users-dept-filter');
    if (!deptFilter) return;

    // Extract unique departments, removing 'N/A' or empties for the filter list if desired
    const depts = [...new Set(this.usersData.map(u => String(u.department).trim()).filter(d => d && d !== 'N/A'))].sort();
    
    // Keep the "All Depts" default option
    deptFilter.innerHTML = '<option value="">All Depts</option>';
    depts.forEach(dept => {
      deptFilter.innerHTML += `<option value="${dept}">${dept}</option>`;
    });
  },

  applyFilters: function() {
    const searchTerm = (document.getElementById('users-search-input')?.value || '').toLowerCase().trim();
    const roleVal = (document.getElementById('users-role-filter')?.value || '').toLowerCase();
    const deptVal = (document.getElementById('users-dept-filter')?.value || '').toLowerCase();
    const statusVal = (document.getElementById('users-status-filter')?.value || '').toLowerCase();

    const filtered = this.usersData.filter(user => {
      // Search
      const matchesSearch = !searchTerm || 
        String(user.user_id).toLowerCase().includes(searchTerm) ||
        String(user.full_name).toLowerCase().includes(searchTerm) ||
        String(user.email).toLowerCase().includes(searchTerm);

      // Role
      const matchesRole = !roleVal || String(user.role).toLowerCase() === roleVal;
      
      // Department
      const matchesDept = !deptVal || String(user.department).toLowerCase() === deptVal;
      
      // Status
      const matchesStatus = !statusVal || String(user.status).toLowerCase() === statusVal;

      return matchesSearch && matchesRole && matchesDept && matchesStatus;
    });

    this.renderStats(filtered);
    this.renderUsers(filtered);
  },

  renderStats: function(users) {
    const total = users.length;
    const active = users.filter(u => String(u.status).toLowerCase() === 'active').length;
    const inactive = users.filter(u => String(u.status).toLowerCase() === 'inactive').length;
    const coordinators = users.filter(u => String(u.role).toLowerCase() === 'coordinator').length;

    const elTotal = document.getElementById('users-stat-total');
    const elActive = document.getElementById('users-stat-active');
    const elInactive = document.getElementById('users-stat-inactive');
    const elCoordinators = document.getElementById('users-stat-coordinators');

    if (elTotal) elTotal.innerText = total;
    if (elActive) elActive.innerText = active;
    if (elInactive) elInactive.innerText = inactive;
    if (elCoordinators) elCoordinators.innerText = coordinators;
  },
  
  renderUsers: function(users) {
    const tbody = document.getElementById('users-table-body');
    if (!tbody) {
      console.error("users-table-body not found");
      return;
    }
    
    tbody.innerHTML = '';
    
    if (!users || users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-5">No Users Found</td></tr>';
      return;
    }
    
    users.forEach(user => {
      let statusBadge = String(user.status).toLowerCase() === 'active' ? 'bg-success' : 'bg-danger';
      let roleBadge = String(user.role).toLowerCase() === 'admin' ? 'bg-dark' : 'bg-primary';
                  
      const rowHTML = `
        <tr>
          <td class="text-muted">${App.Utils.escapeHtml(String(user.user_id))}</td>
          <td class="fw-medium">${App.Utils.escapeHtml(String(user.full_name))}</td>
          <td>${App.Utils.escapeHtml(String(user.email))}</td>
          <td><span class="badge ${roleBadge} rounded-pill">${App.Utils.escapeHtml(String(user.role))}</span></td>
          <td>${App.Utils.escapeHtml(String(user.department))}</td>
          <td><span class="badge ${statusBadge} rounded-pill">${App.Utils.escapeHtml(String(user.status))}</span></td>
          <td class="text-end">
            <button class="btn btn-sm btn-light text-primary me-1" data-action="view-user" data-id="${App.Utils.escapeHtml(String(user.user_id))}" title="View"><i class="bi bi-eye"></i></button>
            <button class="btn btn-sm btn-light text-warning me-1" data-action="edit-user" data-id="${App.Utils.escapeHtml(String(user.user_id))}" title="Edit"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-light text-info me-1" data-action="reset-pwd-user" data-id="${App.Utils.escapeHtml(String(user.user_id))}" title="Reset Password"><i class="bi bi-key"></i></button>
            <button class="btn btn-sm btn-light text-danger" data-action="delete-user" data-id="${App.Utils.escapeHtml(String(user.user_id))}" title="Delete"><i class="bi bi-trash"></i></button>
          </td>
        </tr>
      `;
      tbody.insertAdjacentHTML('beforeend', rowHTML);
    });
  },

  refresh: function() {
    this.load();
  },
  
  destroy: function() {
    App.Logger.info('Users destroy');
  }
};
</script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    'use strict';

    // Existing element selections...
    const loginForm = document.getElementById('loginForm');
    const employeeId = document.getElementById('employeeId');
    const password = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const togglePasswordIcon = document.getElementById('togglePasswordIcon');
    const btnSubmit = document.getElementById('btnSubmit');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const alertContainer = document.getElementById('alertContainer');
    const alertMessage = document.getElementById('alertMessage');
    const alertIcon = document.getElementById('alertIcon');
    const alertText = document.getElementById('alertText');
    
    // NEW: Selection for Forgot Password link
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');

    /**
     * NEW: Redirects user to the Forgot Password view via Google Apps Script routing parameter
     */
    if (forgotPasswordLink) {
      forgotPasswordLink.addEventListener('click', function (event) {
        event.preventDefault();
        
        // Temporarily disable the link to prevent multiple clicks
        forgotPasswordLink.style.pointerEvents = 'none';
        forgotPasswordLink.classList.add('text-muted');
        
        // Use Vanilla SPA Architecture to bypass Chrome Sandbox navigation blocks!
        google.script.run
          .withSuccessHandler(function(html) {
            if (google.script.history && google.script.history.push) {
              google.script.history.push(null, { page: 'forgotpassword' }, null);
            }
            document.open();
            document.write(html);
            document.close();
          })
          .withFailureHandler(function(error) {
            console.error('Failed to load Forgot Password view:', error);
            forgotPasswordLink.style.pointerEvents = 'auto';
            forgotPasswordLink.classList.remove('text-muted');
            alertText.textContent = "Unable to open Forgot Password view. Please try again.";
            alertContainer.classList.remove('d-none');
          })
          .getPageContent('forgotpassword');
      });
    }

    /**
     * Toggles visibility state of the input password text
     */
    togglePasswordBtn.addEventListener('click', function () {
      const isPassword = password.getAttribute('type') === 'password';
      password.setAttribute('type', isPassword ? 'text' : 'password');
      
      togglePasswordIcon.classList.toggle('bi-eye');
      togglePasswordIcon.classList.toggle('bi-eye-slash');
      togglePasswordBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });

    /**
     * Handles login form submit actions
     */
    loginForm.addEventListener('submit', function (event) {
      event.preventDefault();
      hideAlert();

      const isIdValid = employeeId.value.trim() !== '';
      const isPasswordValid = password.value.trim() !== '';

      validateField(employeeId, isIdValid);
      validateField(password, isPasswordValid);

      if (isIdValid && isPasswordValid) {
        setLoading(true);
        
        const loginData = {
          employeeId: employeeId.value.trim(),
          password: password.value
        };
        
        login(loginData);
      }
    });

    function validateField(inputElement, isValid) {
      if (isValid) {
        inputElement.classList.remove('is-invalid');
      } else {
        inputElement.classList.add('is-invalid');
      }
    }

    function setLoading(isLoading) {
      btnSubmit.disabled = isLoading;
      employeeId.disabled = isLoading;
      password.disabled = isLoading;
      togglePasswordBtn.disabled = isLoading;
      if (forgotPasswordLink) forgotPasswordLink.style.pointerEvents = isLoading ? 'none' : 'auto';
      
      if (isLoading) {
        btnText.textContent = 'Authenticating...';
        btnSpinner.classList.remove('d-none');
      } else {
        btnText.textContent = 'Login';
        btnSpinner.classList.add('d-none');
      }
    }

    function showAlert(message, statusType = 'danger') {
      alertText.textContent = message;
      alertMessage.classList.remove('alert-danger', 'alert-success');
      
      if (statusType === 'success') {
        alertMessage.classList.add('alert-success');
        alertIcon.className = 'bi bi-check-circle-fill flex-shrink-0';
      } else {
        alertMessage.classList.add('alert-danger');
        alertIcon.className = 'bi bi-exclamation-triangle-fill flex-shrink-0';
      }

      alertContainer.classList.remove('d-none');
    }

    function hideAlert() {
      alertContainer.classList.add('d-none');
    }

    function login(loginData) {
      google.script.run
        .withSuccessHandler(handleLoginSuccess)
        .withFailureHandler(handleLoginFailure)
        .login(loginData);
    }

  function handleLoginSuccess(response) {

  console.log("========== LOGIN RESPONSE ==========");
  console.log(response);
  console.log("response.success =", response?.success);
  console.log("response.message =", response?.message);
  console.log("response.user =", response?.user);
  console.log("response.data =", response?.data);
  console.log("response.token =", response?.token);
  console.log("===================================");

  setLoading(false);

  if (!(response && response.success)) {
    const errorMsg = response?.message || "Invalid Employee ID or Password.";
    showAlert(errorMsg, "danger");
    return;
  }

  showAlert("Login Successful. Loading Dashboard...", "success");

  // ==========================
  // Detect User
  // ==========================
  const user = response.user || response.data?.user || {};

  const role = String(
    user.Role ||
    user.role ||
    user.ROLE ||
    ""
  ).trim().toUpperCase();

  console.log("Detected Role:", role);

  // ==========================
  // Extract Session Token
  // ==========================

  let actualToken =
      response.token?.["Session Token"] ||
      response.token?.sessionToken ||
      response.token?.token ||

      response.data?.token?.["Session Token"] ||
      response.data?.token?.sessionToken ||
      response.data?.token?.token ||

      (typeof response.token === "string" ? response.token : null) ||
      (typeof response.data?.token === "string" ? response.data.token : null);

  console.log("Extracted Token:", actualToken);

  if (!actualToken) {

      console.error("NO SESSION TOKEN FOUND");
      console.log("Complete Response:");
      console.log(JSON.stringify(response));

      showAlert(
          "Login succeeded but session token was not returned.",
          "danger"
      );

      return;
  }

  // ==========================
  // Save Token
  // ==========================

  localStorage.setItem("sessionToken", actualToken);

  console.log("Saved Token:", actualToken);
  console.log("Stored Token:", localStorage.getItem("sessionToken"));

  // Verify immediately

  if (localStorage.getItem("sessionToken") !== actualToken) {

      console.error("Failed to save session token.");

      showAlert(
          "Unable to save login session.",
          "danger"
      );

      return;
  }

  // ==========================
  // Decide Target Page
  // ==========================

  // ==========================
  // Navigate to Target Page
  // ==========================

  if (role === 'COORDINATOR') {
    // Hide form, show direct user gesture button to prevent browser blocking top-level navigation
    loginForm.classList.add('d-none');
    const redirectContainer = document.getElementById('coordinatorRedirectContainer');
    const btnOpen = document.getElementById('btnOpenCoordinator');
    
    if (redirectContainer && btnOpen) {
      redirectContainer.classList.remove('d-none');
      
      // Request script URL in advance so it is ready
      google.script.run
        .withSuccessHandler(function(scriptUrl) {
          btnOpen.addEventListener('click', function() {
            const coordUrl = scriptUrl + '?page=coordinator&token=' + encodeURIComponent(actualToken);
            console.log('User gesture triggered redirection to standalone page:', coordUrl);
            try {
              window.top.location.href = coordUrl;
            } catch (e) {
              window.location.href = coordUrl;
            }
          });
        })
        .withFailureHandler(function(err) {
          console.error('Failed to pre-fetch script URL:', err);
          btnOpen.addEventListener('click', function() {
            const fallbackUrl = window.APP_SCRIPT_URL + '?page=coordinator&token=' + encodeURIComponent(actualToken);
            try {
              window.top.location.href = fallbackUrl;
            } catch (e) {
              window.location.href = fallbackUrl;
            }
          });
        })
        .getScriptUrl();
    } else {
      // Fallback if elements are missing
      const fallbackUrl = window.APP_SCRIPT_URL + '?page=coordinator&token=' + encodeURIComponent(actualToken);
      try {
        window.top.location.href = fallbackUrl;
      } catch (e) {
        window.location.href = fallbackUrl;
      }
    }

  } else {
    const targetPage = 'dashboard';
    // Admin / Super Admin: load the full dashboard shell via document.write
    google.script.run
      .withSuccessHandler(function(html) {

          console.log('Application shell loaded.');

          if (google.script.history && google.script.history.replace) {
              google.script.history.replace(
                  null,
                  { page: targetPage },
                  null
              );
          }

          document.open();
          document.write(html);
          document.close();

      })
      .withFailureHandler(function(error) {

          console.error(error);
          showAlert(
              'Failed to load application shell.',
              'danger'
          );

      })
      .getPageContent(targetPage);
  }
}
    function handleLoginFailure(error) {
      console.error('System level pipeline failure caught:', error);
      setLoading(false); // ALWAYS stop loading on exception
      showAlert('Unable to connect to the server. Please try again.', 'danger');
    }
  });
</script>

<script>
/**
 * BVC Coordinator Terminal – JavaScript Controller (v2.0)
 * Fully responsive, camera-aware, history-rich, enterprise-grade attendance scanner.
 *
 * Architecture: IIFE module with private state and clean public API.
 * Preserves all existing GAS API calls unchanged.
 */
'use strict';

const CoordinatorUI = (() => {

  // Override google.script.run for external hosting capability
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    const createRunner = (successCb, failureCb) => {
      return new Proxy({}, {
        get: (target, prop) => {
          return (...args) => {
            const apiUrl = window.BACKEND_API_URL || localStorage.getItem('BACKEND_API_URL') || '';
            if (!apiUrl) {
              const err = new Error("BACKEND_API_URL is not set. Please configure window.BACKEND_API_URL or localStorage.");
              console.error(err);
              if (failureCb) failureCb(err);
              return;
            }

            fetch(apiUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: prop, arguments: args })
            })
            .then(res => res.json())
            .then(data => {
              if (successCb) successCb(data);
            })
            .catch(err => {
              console.error(`API Call failed: ${prop}`, err);
              if (failureCb) failureCb(err);
            });
          };
        }
      });
    };

    window.google = {
      script: {
        run: {
          withSuccessHandler: (successCb) => {
            return {
              withFailureHandler: (failureCb) => createRunner(successCb, failureCb),
              ...createRunner(successCb, null)
            };
          },
          withFailureHandler: (failureCb) => {
            return {
              withSuccessHandler: (successCb) => createRunner(successCb, failureCb),
              ...createRunner(null, failureCb)
            };
          }
        }
      }
    };
  }

  // ==========================================================================
  //  PRIVATE STATE
  // ==========================================================================
  const state = {
    sessionToken: null,
    isProcessing: false,
    lastInputType: 'Barcode',
    activeEventAttendanceType: 'Fixed',
    statistics: { present: 0, remaining: 0, total: 0 },
    duplicatesCount: 0,
    // Full scan history from server; client-side search/filter applied on this
    allScans: [],
    // Cameras
    availableCameras: [],          // { id, label }
    activeCameraIndex: 0,          // index into availableCameras
    cameraRunning: false,
    facingMode: 'environment',     // 'environment' | 'user'
    // Duplicate prevention cooldown
    recentRolls: {},               // { roll: timestamp }
    DUPLICATE_COOLDOWN_MS: 5000,
    // Search/filter state
    searchQuery: '',
    deptFilter: '',
  };

  let dom = {};
  let html5QrCode = null;

  // ==========================================================================
  //  INIT
  // ==========================================================================
  const init = () => {
    cacheDOM();
    bindEvents();
    extractSessionToken();
    monitorConnection();
    initCamera();
    loadBackendTerminalData();
    CameraDebugger.init();
  };

  const cacheDOM = () => {
    dom = {
      // Form & Input
      form:              document.getElementById('attendance-input-form'),
      input:             document.getElementById('barcode-roll-input'),
      submitBtn:         document.getElementById('btn-submit-attendance'),
      scannerStatus:     document.getElementById('scanner-status'),

      // Event info
      eventTitleDisplay: document.getElementById('event-title-display'),
      terminalEventName: document.getElementById('terminal-event-name'),
      eventDate:         document.getElementById('terminal-event-date'),
      coordName:         document.getElementById('terminal-coordinator-name'),
      eventStatusBadge:  document.getElementById('event-status-badge'),
      lastScanTime:      document.getElementById('last-scan-time'),
      cameraStatusText:  document.getElementById('camera-status-text'),

      // Stats
      statsPresent:      document.getElementById('stat-present-count'),
      statsRemaining:    document.getElementById('stat-remaining-count'),
      statsTotal:        document.getElementById('stat-total-count'),
      statsDuplicate:    document.getElementById('stat-duplicate-count'),
      statsPct:          document.getElementById('stat-percent-count'),
      statsProgress:     document.getElementById('stat-progress-bar'),

      // Student preview
      previewPlaceholder: document.getElementById('student-preview-placeholder'),
      previewContent:    document.getElementById('student-preview-content'),
      previewStrip:      document.getElementById('preview-status-strip'),
      previewName:       document.getElementById('preview-student-name'),
      previewRoll:       document.getElementById('preview-student-roll'),
      previewDept:       document.getElementById('preview-student-dept'),
      previewYear:       document.getElementById('preview-student-year'),
      previewAvatar:     document.getElementById('preview-avatar-badge'),

      // Camera
      viewportPlaceholder: document.getElementById('viewport-placeholder'),
      cameraDeviceSelect:  document.getElementById('camera-device-select'),
      btnFlipCamera:       document.getElementById('btn-flip-camera'),
      btnToggleCamera:     document.getElementById('btn-toggle-camera'),
      cameraToggleIcon:    document.getElementById('camera-toggle-icon'),

      // History
      historyFeed:       document.getElementById('recent-scans-container'),
      historySkeleton:   document.getElementById('history-skeleton'),
      historyEmptyState: document.getElementById('history-empty-state'),
      historyCountBadge: document.getElementById('history-count-badge'),
      searchInput:       document.getElementById('history-search-input'),
      deptFilter:        document.getElementById('history-dept-filter'),

      // Header buttons
      refreshBtn:        document.getElementById('btn-terminal-refresh'),
      syncBtn:           document.getElementById('btn-terminal-sync'),
      logoutBtn:         document.getElementById('btn-terminal-logout'),
      connectionStatus:  document.getElementById('connection-status'),
      connDot:           document.getElementById('conn-dot'),
      connLabel:         document.getElementById('conn-label'),

      // Toast
      toastStack:        document.getElementById('coord-toast-stack'),

      // Spot modal
      spotModalElement:  document.getElementById('spotRegistrationModal'),
      spotForm:          document.getElementById('spot-registration-form'),
      spotRollInput:     document.getElementById('spot-roll-input'),
      spotNameInput:     document.getElementById('spot-name-input'),
      spotCollegeInput:  document.getElementById('spot-college-input'),
      spotDeptSelect:    document.getElementById('spot-dept-select'),
      spotYearSelect:    document.getElementById('spot-year-select'),
      spotOpenView:      document.getElementById('spot-open-event-view'),
      spotFixedView:     document.getElementById('spot-fixed-event-view'),
      spotOpenRollDisp:  document.getElementById('spot-open-roll-display'),
      spotFixedRollDisp: document.getElementById('spot-fixed-roll-display'),
      spotDeptOtherCont: document.getElementById('spot-dept-other-container'),
      spotDeptOtherInp:  document.getElementById('spot-dept-other-input'),
      btnConfirmSpotOpen:document.getElementById('btn-confirm-spot-open'),
    };

    // Bootstrap modal init
    if (dom.spotModalElement && typeof bootstrap !== 'undefined') {
      dom.spotModal = new bootstrap.Modal(dom.spotModalElement);
    }
  };

  // ==========================================================================
  //  EVENT BINDING
  // ==========================================================================
  const bindEvents = () => {
    // Barcode input - track mode
    if (dom.input) {
      dom.input.addEventListener('input', (e) => {
        setSubmitEnabled(dom.input.value.trim().length > 0);
        state.lastInputType = (dom.input.value.length > 3 && !e.inputType) ? 'Barcode' : 'Manual';
      });
    }

    // Form submit
    if (dom.form) {
      dom.form.addEventListener('submit', (e) => { e.preventDefault(); submitAttendance(); });
    }

    // Header buttons
    if (dom.refreshBtn) dom.refreshBtn.addEventListener('click', () => { resetUI(); loadBackendTerminalData(); });
    if (dom.syncBtn)    dom.syncBtn.addEventListener('click',    () => loadBackendTerminalData(true));
    if (dom.logoutBtn)  dom.logoutBtn.addEventListener('click',  () => executeLogout());

    // Camera buttons
    if (dom.btnToggleCamera) dom.btnToggleCamera.addEventListener('click', toggleCamera);
    if (dom.btnFlipCamera)   dom.btnFlipCamera.addEventListener('click',   flipCamera);
    if (dom.cameraDeviceSelect) {
      dom.cameraDeviceSelect.addEventListener('change', () => {
        const idx = dom.cameraDeviceSelect.selectedIndex;
        state.activeCameraIndex = idx;
        if (state.cameraRunning) {
          stopCamera().then(() => startCameraWithCurrentDevice());
        }
      });
    }

    // Search & filter
    if (dom.searchInput) {
      dom.searchInput.addEventListener('input', () => {
        state.searchQuery = dom.searchInput.value.trim().toLowerCase();
        renderHistory();
      });
    }
    if (dom.deptFilter) {
      dom.deptFilter.addEventListener('change', () => {
        state.deptFilter = dom.deptFilter.value;
        renderHistory();
      });
    }

    // Spot modal - branch select
    if (dom.spotDeptSelect) {
      dom.spotDeptSelect.addEventListener('change', (e) => {
        const showOther = e.target.value === 'OTHERS';
        dom.spotDeptOtherCont && dom.spotDeptOtherCont.classList.toggle('d-none', !showOther);
        if (dom.spotDeptOtherInp) {
          dom.spotDeptOtherInp.required = showOther;
          if (!showOther) dom.spotDeptOtherInp.value = '';
        }
      });
    }

    // Spot modal submit
    if (dom.spotForm)          dom.spotForm.addEventListener('submit', (e) => { e.preventDefault(); submitSpotFixed(); });
    if (dom.btnConfirmSpotOpen) dom.btnConfirmSpotOpen.addEventListener('click', submitSpotOpen);

    // Re-focus input when spot modal closes
    if (dom.spotModalElement) {
      dom.spotModalElement.addEventListener('hidden.bs.modal', () => { focusInput(); });
    }

    // Auto-focus lock on desktop: body clicks redirect to input
    document.body.addEventListener('click', (e) => {
      const modalOpen = dom.spotModalElement && dom.spotModalElement.classList.contains('show');
      if (modalOpen) return;
      const ignore = [dom.logoutBtn, dom.refreshBtn, dom.syncBtn, dom.btnFlipCamera,
                      dom.btnToggleCamera, dom.cameraDeviceSelect, dom.searchInput, dom.deptFilter];
      if (!ignore.includes(e.target) && dom.form && !dom.form.contains(e.target)) {
        focusInput();
      }
    });

    // Re-focus after blur (with guard)
    if (dom.input) {
      dom.input.addEventListener('blur', () => {
        setTimeout(() => {
          const active = document.activeElement;
          const modalOpen = dom.spotModalElement && dom.spotModalElement.classList.contains('show');
          if (!modalOpen && active !== dom.logoutBtn && active !== dom.refreshBtn &&
              active !== dom.syncBtn && active !== dom.searchInput && active !== dom.deptFilter &&
              active !== dom.cameraDeviceSelect) {
            focusInput();
          }
        }, 120);
      });
    }
  };

  // ==========================================================================
  //  SESSION TOKEN
  // ==========================================================================
  const extractSessionToken = () => {
    try {
      console.log('=== FRONTEND SESSION INVESTIGATION ===');
      
      const templateToken = (typeof window.SESSION_TOKEN_FROM_BACKEND !== 'undefined') ? window.SESSION_TOKEN_FROM_BACKEND : null;
      console.log('Token received after login (from server template parameter):', templateToken);
      
      // 1. Primary: token injected by backend template context
      if (templateToken) {
        localStorage.setItem('sessionToken', templateToken);
        state.sessionToken = templateToken;
        console.log('Session token loaded from server-injected template parameter:', templateToken);
      } else {
        // 2. Secondary: token passed in URL by login redirect (?page=coordinator&token=...)
        const params = new URLSearchParams(window.location.search);
        const urlToken = params.get('token');
        console.log('Token retrieved from URL parameter:', urlToken);
        if (urlToken) {
          localStorage.setItem('sessionToken', urlToken);
          state.sessionToken = urlToken;
          console.log('Session token loaded from URL parameter and stored in localStorage:', urlToken);
        } else {
          // 3. Fallback: token stored in localStorage (e.g. page refresh)
          state.sessionToken = localStorage.getItem('sessionToken') || null;
          console.log('Session token loaded from fallback localStorage:', state.sessionToken);
        }
      }

      const storedToken = localStorage.getItem('sessionToken');
      console.log('Token stored in localStorage:', storedToken);

      if (templateToken && storedToken && templateToken !== storedToken) {
        console.warn('⚠️ WARNING: Stored token in localStorage differs from the login response template token!');
        console.warn('Template Token:', templateToken);
        console.warn('Stored Token:', storedToken);
      }
      
      console.log('Final resolved token to be used:', state.sessionToken);
      console.log('=======================================');
    } catch (e) {
      console.error('Session token extraction error:', e);
    }
  };

  // ==========================================================================
  //  NETWORK MONITOR
  // ==========================================================================
  const monitorConnection = () => {
    const update = () => {
      const online = navigator.onLine;
      if (dom.connectionStatus) dom.connectionStatus.classList.toggle('offline', !online);
      if (dom.connLabel) dom.connLabel.textContent = online ? 'Online' : 'Offline';
    };
    window.addEventListener('online',  update);
    window.addEventListener('offline', update);
    update();
  };

  // ==========================================================================
  //  CAMERA MANAGEMENT
  // ==========================================================================
  let preflightDeviceId = null;

  const initCamera = async () => {
    console.log("=== CAMERA INIT START ===");
    if (typeof Html5Qrcode === 'undefined') {
      setCameraStatus('Unavailable');
      return;
    }

    try {
      console.log("Requesting camera permission preflight...");
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment"
        }
      });
      
      console.log("Preflight stream obtained successfully.");
      const tracks = stream.getVideoTracks();
      tracks.forEach((track, idx) => {
        console.log(`Track ${idx}:`, track.label, "ReadyState:", track.readyState);
      });

      if (tracks.length > 0) {
        const settings = tracks[0].getSettings();
        preflightDeviceId = settings.deviceId;
        console.log("Saved preflight deviceId:", preflightDeviceId);
      }

      // Stop temporary tracks immediately
      tracks.forEach(track => {
        track.stop();
        console.log("Stopped preflight track:", track.label);
      });

      // Query available cameras
      try {
        console.log("Querying getCameras() after permission grant...");
        const cameras = await Html5Qrcode.getCameras();
        console.log("getCameras() returned:", cameras);
        
        if (cameras && cameras.length > 0) {
          state.availableCameras = cameras;
          setCameraStatus('Ready – tap to start');

          // Show device selector when multiple cameras exist
          if (cameras.length > 1 && dom.cameraDeviceSelect) {
            dom.cameraDeviceSelect.innerHTML = cameras.map((c, i) =>
              `<option value="${i}">${c.label || `Camera ${i + 1}`}</option>`
            ).join('');
            dom.cameraDeviceSelect.classList.remove('d-none');
            // Default to rear/environment camera
            const envIdx = cameras.findIndex(c => /back|rear|environment/i.test(c.label));
            state.activeCameraIndex = envIdx >= 0 ? envIdx : 0;
            dom.cameraDeviceSelect.selectedIndex = state.activeCameraIndex;
          }
        } else {
          console.warn("getCameras() returned empty array. Will use preflightDeviceId.");
          setCameraStatus('Ready – tap to start');
        }
      } catch (err) {
        console.warn("getCameras() failed, falling back to preflightDeviceId. Error:", err);
        setCameraStatus('Ready – tap to start');
      }
    } catch (err) {
      console.error("Camera permission preflight FAILED:", err);
      setCameraStatus('Permission denied');
      showToast('error', 'Camera permission denied: ' + err.message);
    }
    console.log("=== CAMERA INIT END ===");
  };

  const startCameraWithCurrentDevice = () => {
    if (typeof Html5Qrcode === 'undefined') {
      showToast('error', 'QR scanner library not loaded. Check internet connection.');
      return;
    }
    if (state.cameraRunning) return; // Already running

    const container = document.getElementById('interactive-camera-scanner');
    if (container) container.innerHTML = '';
    html5QrCode = null;

    try {
      html5QrCode = new Html5Qrcode('interactive-camera-scanner', {
        verbose: false
      });
    } catch (e) {
      console.error('Html5Qrcode instantiation failed:', e);
      setCameraStatus('Init failed');
      showToast('error', 'Failed to initialize camera scanner.');
      return;
    }

    // Build camera constraint
    let cameraConstraint;
    let selectedCamera = null;
    if (state.availableCameras.length > 0 && state.availableCameras[state.activeCameraIndex]) {
      selectedCamera = state.availableCameras[state.activeCameraIndex];
      cameraConstraint = selectedCamera.id;
    } else if (preflightDeviceId) {
      console.log("Using preflightDeviceId directly for constraint:", preflightDeviceId);
      cameraConstraint = preflightDeviceId;
    } else {
      // Fallback: facingMode only
      cameraConstraint = { facingMode: state.facingMode };
    }

    console.log('=== START CAMERA CONTROLS ===');
    console.log('cameraConstraint:', cameraConstraint);
    console.log('activeCameraIndex:', state.activeCameraIndex);
    console.log('selected camera label:', selectedCamera ? selectedCamera.label : 'N/A');
    console.log('selected camera id:', selectedCamera ? selectedCamera.id : 'N/A');
    console.log('=============================');

    const config = {
      fps: 10,
      qrbox: (w, h) => {
        const size = Math.min(w, h) * 0.7;
        return { width: Math.round(size), height: Math.round(size * 0.6) };
      },
      disableFlip: false,
      rememberLastUsedCamera: false,
    };

    setCameraStatus('Starting...');

    html5QrCode.start(
      cameraConstraint,
      config,
      (decodedText) => {
        const now = Date.now();
        const lastScan = state.recentRolls[decodedText] || 0;
        if (now - lastScan < state.DUPLICATE_COOLDOWN_MS) return;
        state.recentRolls[decodedText] = now;

        if (state.isProcessing) return;
        if (navigator.vibrate) navigator.vibrate([80]);

        if (dom.input) {
          dom.input.value = decodedText.trim().toUpperCase();
          state.lastInputType = 'Barcode';
          submitAttendance();
        }
      },
      () => { /* QR frame error – ignore */ }
    ).then(() => {
      state.cameraRunning = true;
      setCameraStatus('Active');
      if (dom.viewportPlaceholder) dom.viewportPlaceholder.classList.add('hidden');
      if (dom.cameraToggleIcon)   dom.cameraToggleIcon.className = 'bi bi-camera-video-fill';
      console.log('Camera started successfully.');
    }).catch(err => {
      state.cameraRunning = false;
      html5QrCode = null;
      console.error('Camera start failed:', err);
      const msg = err && err.message ? err.message : String(err);
      if (/permission|denied|NotAllowed/i.test(msg)) {
        setCameraStatus('Permission denied');
        showToast('error', 'Camera permission denied or permissions policy violation.');
      } else if (/NotFound|no camera/i.test(msg)) {
        setCameraStatus('No camera found');
        showToast('warning', 'No camera detected on this device.');
      } else {
        setCameraStatus('Failed – use manual input');
        showToast('error', 'Camera failed to start: ' + msg);
      }
    });
  };

  const stopCamera = () => {
    return new Promise((resolve) => {
      if (html5QrCode && state.cameraRunning) {
        html5QrCode.stop().then(() => {
          state.cameraRunning = false;
          html5QrCode = null; // Destroy instance fully so next start is clean
          if (dom.cameraToggleIcon)    dom.cameraToggleIcon.className = 'bi bi-camera-video-off-fill';
          if (dom.viewportPlaceholder) dom.viewportPlaceholder.classList.remove('hidden');
          setCameraStatus('Stopped');
          resolve();
        }).catch(err => {
          console.error('Camera stop error:', err);
          state.cameraRunning = false;
          html5QrCode = null;
          resolve();
        });
      } else {
        state.cameraRunning = false;
        html5QrCode = null;
        resolve();
      }
    });
  };

  const toggleCamera = () => {
    console.log("ACTIVE CAMERA BUILD v2 - " + new Date().toISOString());
    console.log("preflightDeviceId =", preflightDeviceId);
    console.log("available cameras =", state.availableCameras.length);
    if (state.cameraRunning) {
      stopCamera();
    } else {
      // If cameras not yet enumerated, try to enumerate first then start
      if (state.availableCameras.length === 0 && typeof Html5Qrcode !== 'undefined') {
        Html5Qrcode.getCameras().then(cameras => {
          if (cameras && cameras.length > 0) {
            state.availableCameras = cameras;
            if (cameras.length > 1 && dom.cameraDeviceSelect) {
              dom.cameraDeviceSelect.innerHTML = cameras.map((c, i) =>
                `<option value="${i}">${c.label || `Camera ${i + 1}`}</option>`
              ).join('');
              dom.cameraDeviceSelect.classList.remove('d-none');
              
              // Smart camera default choice: prefer rear environment camera if it exists, otherwise use first camera
              const envIdx = cameras.findIndex(c => /back|rear|environment/i.test(c.label));
              state.activeCameraIndex = envIdx >= 0 ? envIdx : 0;
              dom.cameraDeviceSelect.selectedIndex = state.activeCameraIndex;
            }
          }
          startCameraWithCurrentDevice();
        }).catch(() => startCameraWithCurrentDevice());
      } else {
        startCameraWithCurrentDevice();
      }
    }
  };

  const flipCamera = () => {
    const cameras = state.availableCameras;
    if (cameras.length > 1) {
      state.activeCameraIndex = (state.activeCameraIndex + 1) % cameras.length;
      if (dom.cameraDeviceSelect) dom.cameraDeviceSelect.selectedIndex = state.activeCameraIndex;
    } else {
      state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
    }
    if (state.cameraRunning) {
      stopCamera().then(() => startCameraWithCurrentDevice());
    } else {
      showToast('info', 'Camera mode changed. Press the camera button to start.');
    }
  };

  const setCameraStatus = (text) => {
    if (dom.cameraStatusText) dom.cameraStatusText.textContent = text;
  };

  // ==========================================================================
  //  BACKEND HYDRATION
  // ==========================================================================
  const loadBackendTerminalData = (showSyncToast = false) => {
    setScannerStatus('Syncing...', 'status-info');
    if (dom.input) dom.input.disabled = true;

    console.log('=== FRONTEND API CALL INVESTIGATION ===');
    console.log('state.sessionToken:', state.sessionToken);
    console.log('localStorage sessionToken:', localStorage.getItem('sessionToken'));
    console.log('Is state.sessionToken valid?:', !!state.sessionToken);
    console.log('=======================================');

    google.script.run
      .withSuccessHandler((res) => {
        console.log("========== SUCCESS CALLBACK ==========");
        console.log("Complete Response:", res);
        console.log("Success:", res?.success);
        console.log("Message:", res?.message);

        if (res) {
            console.log("User:", res.user);
            console.log("Event:", res.event);
            console.log("Statistics:", res.statistics);
            console.log("Recent Scans:", res.recentScans);
        }
        console.log("======================================");

        if (dom.input) dom.input.disabled = false;
        if (res && res.success) {
          try {
              console.log("Calling hydrateUI()");
              hydrateUI(res);
              console.log("hydrateUI() completed successfully");
          } catch (e) {
              console.error("HYDRATE UI FAILED");
              console.error(e);
              console.error(e.stack);
          }
          setScannerStatus('Ready', '');
          focusInput();
          if (showSyncToast) showToast('success', 'Synced with server successfully.');
        } else {
          if (res && res.message && (res.message.indexOf('No active event assignments') !== -1 || res.message.indexOf('No active event') !== -1)) {
            setScannerStatus('No Event Assigned', 'status-warn');
            showToast('warning', 'No event assigned. Please contact the administrator.');
            if (dom.eventTitleDisplay) dom.eventTitleDisplay.textContent = 'No Event Assigned';
            if (dom.terminalEventName) dom.terminalEventName.textContent = 'No Event Assigned';
            if (dom.eventDate) dom.eventDate.innerHTML = `<i class="bi bi-calendar3"></i> N/A`;
            hideSkeleton();
            return;
          }
          setScannerStatus('Auth error', 'status-error');
          showToast('error', res && res.message ? res.message : 'Session verification failed.');
          handleRedirect();
        }
      })
      .withFailureHandler((err) => {
        if (dom.input) dom.input.disabled = false;
        setScannerStatus('Offline – manual entry active', 'status-warn');
        updateConnectionStatus(false);
        showToast('error', 'Server unreachable. Manual entry available.');
        focusInput();
      })
      .getCoordinatorTerminalData(state.sessionToken);
  };

  const hydrateUI = (data) => {
    console.log("========== HYDRATE UI ==========");
    console.log(data);
    if (!data) {
        console.error("hydrateUI received NULL data");
        return;
    }
    console.log("Event:", data.event);
    console.log("User:", data.user);
    console.log("Statistics:", data.statistics);
    console.log("Recent Scans:", data.recentScans);
    console.log("================================");

    // Dom element validation checks (Step 6)
    if (!dom.eventTitleDisplay) console.error("eventTitleDisplay not found");
    if (!dom.terminalEventName) console.error("terminalEventName not found");
    if (!dom.eventDate) console.error("eventDate not found");
    if (!dom.coordName) console.error("coordName not found");
    if (!dom.statsPresent) console.error("statsPresent not found");
    if (!dom.statsRemaining) console.error("statsRemaining not found");
    if (!dom.statsTotal) console.error("statsTotal not found");
    if (!dom.historyFeed) console.error("historyFeed not found");

    // Event details
    const ev = data.event || {};
    const eventName = ev['Event Name'] || ev.eventName || 'Event Active';
    if (dom.eventTitleDisplay)  dom.eventTitleDisplay.textContent = eventName;
    if (dom.terminalEventName)  dom.terminalEventName.textContent = eventName;
    if (dom.eventDate)          dom.eventDate.innerHTML = `<i class="bi bi-calendar3"></i> ${ev['Start Date'] || ev.startDate || 'Live'}`;
    console.log("Updated event title");

    // Coordinator name
    const u = data.user || {};
    const coordName = u['First Name'] || u['Student Name'] || u['Name'] || u.name || 'Coordinator';
    if (dom.coordName) dom.coordName.innerHTML = `<i class="bi bi-person-badge"></i> ${coordName}`;
    console.log("Updated coordinator name");

    // Attendance type
    state.activeEventAttendanceType = ev['Attendance Type'] || ev.attendanceType || 'Fixed';

    // Stats
    if (data.statistics) {
      state.statistics = {
        present:   data.statistics.present   || 0,
        remaining: data.statistics.remaining || 0,
        total:     data.statistics.total     || 0,
      };
      renderStats();
      console.log("Updated statistics");
    }

    // Full scan history
    if (data.recentScans && Array.isArray(data.recentScans)) {
      state.allScans = data.recentScans;
      populateDeptFilter();
      hideSkeleton();
      renderHistory();
      console.log("Rendered history");
    } else {
      hideSkeleton();
    }
    console.log("Hydration completed");
  };

  // ==========================================================================
  //  ATTENDANCE SUBMISSION
  // ==========================================================================
  const submitAttendance = () => {
    if (state.isProcessing || !dom.input || !dom.input.value.trim()) return;

    const rawInput = dom.input.value.trim().toUpperCase();
    state.isProcessing = true;

    setScannerStatus('Saving...', '');
    setSubmitEnabled(false, '<span class="spinner-border spinner-border-sm" role="status"></span>');
    if (dom.input) dom.input.disabled = true;

    google.script.run
      .withSuccessHandler((res) => {
        if (dom.input) dom.input.disabled = false;
        state.isProcessing = false;
        clearInput();
        setSubmitEnabled(false);

        if (res && res.success) {
          playTone('success');
          setScannerStatus('✔ Attendance marked!', 'status-success');

          // Update stats
          if (res.data && res.data.statistics) {
            state.statistics = {
              present:   res.data.statistics.present   || 0,
              remaining: res.data.statistics.remaining || 0,
              total:     res.data.statistics.total     || 0,
            };
          } else {
            state.statistics.present++;
            state.statistics.remaining = Math.max(0, state.statistics.remaining - 1);
          }
          renderStats();

          // Student preview
          const student = res.data && res.data.student ? res.data.student : {};
          showStudentPreview({
            name: student.name || student['Student Name'] || rawInput,
            roll: student.roll || rawInput,
            dept: student.dept || student['Department ID'] || '',
            year: student.year || student['Year'] || '',
          }, 'success');

          // Prepend to local feed
          prependScanLocally(student.name || student['Student Name'] || 'Student', rawInput, student.dept || '', false);
          updateLastScanTime();
          showToast('success', res.message || 'Attendance marked.');

          setTimeout(() => { setScannerStatus('Ready', ''); focusInput(); }, 900);

        } else {
          playTone('error');

          if (res && res.message && /already/i.test(res.message)) {
            // Duplicate
            state.duplicatesCount++;
            renderStats();
            showStudentPreview({ name: 'Already Scanned', roll: rawInput, dept: 'Duplicate', year: '' }, 'duplicate');
            prependScanLocally('Already Scanned', rawInput, '', true);
            showToast('warning', res.message);
            setScannerStatus('Duplicate – ignored', 'status-warn');
            setTimeout(() => { setScannerStatus('Ready', ''); focusInput(); }, 1200);
          } else {
            // Not registered → spot modal
            setScannerStatus('Not registered – opening form', 'status-warn');
            openSpotModal(rawInput);
          }
        }
      })
      .withFailureHandler((err) => {
        if (dom.input) dom.input.disabled = false;
        state.isProcessing = false;
        clearInput();
        setSubmitEnabled(false);
        playTone('error');
        setScannerStatus('Server error', 'status-error');
        showToast('error', 'Connection failed. Check your internet and try again.');
        focusInput();

      .markCoordinatorAttendance(state.sessionToken, rawInput, state.lastInputType);

  const submitSpotFixed = () => {

  // ==========================================================================
  //  QUERY STUDENT (fallback for when server doesn't return student object)
  // ==========================================================================
  const queryStudentProfile = (rollNumber) => {
    google.script.run
      .withSuccessHandler((res) => {
        if (res && res.success && res.data) {
          const s = res.data.student || res.data;
          showStudentPreview({ name: s['Student Name'] || s.name, roll: rollNumber, dept: s['Department ID'] || '', year: s['Year'] || '' }, 'success');

  // ==========================================================================
  //  HISTORY RENDERING
  // ==========================================================================
  const populateDeptFilter = () => {
    if (!dom.deptFilter) return;
    const depts = [...new Set(state.allScans.map(s => s.dept || '').filter(Boolean))].sort();
    const currentVal = dom.deptFilter.value;
    dom.deptFilter.innerHTML = '<option value="">All Depts</option>' +
      depts.map(d => `<option value="${d}">${d}</option>`).join('');
    dom.deptFilter.value = currentVal;
  };

  const getFilteredScans = () => {
    return state.allScans.filter(scan => {
      const matchSearch = !state.searchQuery ||
        (scan.roll || '').toLowerCase().includes(state.searchQuery) ||
        (scan.name || '').toLowerCase().includes(state.searchQuery);
      const matchDept = !state.deptFilter || scan.dept === state.deptFilter;
      return matchSearch && matchDept;
    });
  };

  const renderHistory = () => {
    if (!dom.historyFeed) return;

    const filtered = getFilteredScans();

    if (dom.historyCountBadge) {
      dom.historyCountBadge.textContent = filtered.length;
    }

    if (filtered.length === 0) {
      dom.historyFeed.classList.add('d-none');
      dom.historyEmptyState && dom.historyEmptyState.classList.remove('d-none');
      return;
    }

    dom.historyEmptyState && dom.historyEmptyState.classList.add('d-none');
    dom.historyFeed.classList.remove('d-none');

    // Render using DocumentFragment for performance
    const frag = document.createDocumentFragment();
    filtered.forEach(scan => {
      const div = document.createElement('div');
      div.className = 'coord-feed-row';
      div.setAttribute('role', 'listitem');
      const isDup = !!scan.isDuplicate;
      div.innerHTML = `
        <div class="coord-feed-avatar ${isDup ? 'feed-av-duplicate' : 'feed-av-success'}">
          <i class="bi ${isDup ? 'bi-x' : 'bi-check'}"></i>
        </div>
        <div class="coord-feed-info">
          <div class="coord-feed-roll">${escapeHtml(scan.roll || '')}</div>
          <div class="coord-feed-name">${escapeHtml(scan.name || 'Unknown Student')}</div>
          ${scan.dept ? `<span class="coord-feed-dept">${escapeHtml(scan.dept)}</span>` : ''}
        </div>
        <div class="coord-feed-right">
          <span class="coord-feed-time">${formatTime(scan.time)}</span>
          <i class="bi coord-feed-status-icon ${isDup ? 'bi-x-circle-fill dup' : 'bi-check-circle-fill ok'}"></i>
        </div>
      `;
      frag.appendChild(div);
    });

    dom.historyFeed.innerHTML = '';
    dom.historyFeed.appendChild(frag);
  };

  const prependScanLocally = (name, roll, dept, isDuplicate) => {
    const now = new Date();
    const timeStr = now.toTimeString().split(' ')[0]; // HH:MM:SS
    state.allScans.unshift({ name, roll, dept, time: timeStr, isDuplicate });
    populateDeptFilter();
    renderHistory();
    // Briefly highlight top row
    if (dom.historyFeed && dom.historyFeed.firstChild) {
      dom.historyFeed.firstChild.classList.add('new-scan');
    }
  };

  const hideSkeleton = () => {
    if (dom.historySkeleton) dom.historySkeleton.classList.add('d-none');
  };

  // ==========================================================================
  //  STATS RENDERING
  // ==========================================================================
  const renderStats = () => {
    if (dom.statsPresent)   dom.statsPresent.textContent   = state.statistics.present;
    if (dom.statsRemaining) dom.statsRemaining.textContent = state.statistics.remaining;
    if (dom.statsTotal)     dom.statsTotal.textContent     = state.statistics.total;
    if (dom.statsDuplicate) dom.statsDuplicate.textContent = state.duplicatesCount;

    const pct = state.statistics.total > 0
      ? Math.round((state.statistics.present / state.statistics.total) * 100)
      : 0;
    if (dom.statsPct)      dom.statsPct.textContent = `${pct}%`;

  // ==========================================================================

  const showStudentPreview = (student, mode = 'success') => {
    if (!dom.previewContent || !dom.previewPlaceholder) return;
    const isSuccess = mode === 'success';

    if (dom.previewName)   dom.previewName.textContent   = student.name || '';
    if (dom.previewRoll)   dom.previewRoll.textContent   = student.roll || '';
    if (dom.previewDept)   dom.previewDept.textContent   = student.dept || '';

    if (dom.previewStrip) {

      dom.previewStrip.innerHTML = isSuccess

        : '<i class="bi bi-exclamation-triangle-fill me-1"></i> Duplicate / Not Registered';
    }
    if (dom.previewAvatar) {
      dom.previewAvatar.className = `coord-preview-avatar ${isSuccess ? '' : 'av-duplicate'}`;
      dom.previewAvatar.innerHTML = `<i class="bi ${isSuccess ? 'bi-check' : 'bi-x'}"></i>`;

    dom.previewContent.classList.remove('d-none');

  const setScannerStatus = (text, cssClass = '') => {

  // ==========================================================================
  //  TOASTS
  // ==========================================================================
  const showToast = (type, message) => {
    if (!dom.toastStack) return;

    const iconMap = {
      success: 'bi-check-circle-fill',
      error:   'bi-exclamation-triangle-fill',
      warning: 'bi-exclamation-circle-fill',
      info:    'bi-info-circle-fill',
    };

    const toast = document.createElement('div');
    toast.className = `coord-toast coord-toast-${type}`;
    toast.setAttribute('role', 'alert');

      <i class="bi ${iconMap[type] || iconMap.info}"></i>
      <span>${escapeHtml(message)}</span>

    dom.toastStack.appendChild(toast);

    setTimeout(() => {
      toast.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      toast.style.opacity = '0';
      toast.style.transform = 'translateY(8px)';
      setTimeout(() => toast.remove(), 320);
    }, 2800);
  };

  // ==========================================================================
  //  AUDIO FEEDBACK (Web Audio API)
  // ==========================================================================
  const playTone = (type) => {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      const ctx = new Ctx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      if (type === 'success') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(987, ctx.currentTime);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        osc.start();
        gain.gain.setValueAtTime(0, ctx.currentTime + 0.07);
        gain.gain.setValueAtTime(0.08, ctx.currentTime + 0.10);
        osc.frequency.setValueAtTime(1175, ctx.currentTime + 0.10);
        osc.stop(ctx.currentTime + 0.18);
      } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(160, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.28);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
        osc.stop(ctx.currentTime + 0.30);
      }
    } catch (e) {/* ignore audio errors */ }
  };

  // ==========================================================================
  //  LOGOUT / REDIRECT
  // ==========================================================================
  const executeLogout = () => {
    stopCamera();
    setScannerStatus('Logging out...', '');

      .withFailureHandler(() => handleRedirect())

  const handleRedirect = () => {
    try {
      google.script.run.withSuccessHandler((url) => {

    } catch (_) {
      window.location.href = window.location.pathname + '?page=Login';

  // ==========================================================================
  //  UTILITIES
  // ==========================================================================
  const escapeHtml = (str) => {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  };

  const formatTime = (rawTime) => {
    if (!rawTime) return '--:--';
    // If already HH:MM:SS or HH:MM, just return as-is
    if (/^\d{1,2}:\d{2}/.test(String(rawTime))) return String(rawTime).substring(0, 5);
    // Try parsing as ISO or spreadsheet date
    try { const d = new Date(rawTime); if (!isNaN(d)) return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }); } catch (_) {}
    return String(rawTime).substring(0, 8);
  };

  // ==========================================================================
  //  CAMERA TEST & DIAGNOSTICS SUITE (DEBUG PANEL)
  // ==========================================================================
  const CameraDebugger = (() => {
    const logs = [];

    const addLog = (type, functionName, message, duration = 0, error = null) => {
      const logEntry = {
        timestamp: new Date().toLocaleTimeString(),
        type: type.toUpperCase(),
        functionName: functionName,
        message: message,
        duration: duration,
        error: error ? { name: error.name, message: error.message, stack: error.stack } : null
      };
      logs.push(logEntry);
      
      // Update Live UI Timeline
      const timeline = document.getElementById('dbg-timeline');
      if (timeline) {
        const color = type === 'error' ? 'text-danger' : (type === 'success' ? 'text-success' : (type === 'warn' ? 'text-warning' : 'text-dark'));
        const entryHtml = `<div class="mb-1 border-bottom pb-1" style="font-size: 0.65rem;">
          <span class="text-secondary">[${logEntry.timestamp}]</span> 
          <span class="fw-bold ${color}">${logEntry.type}</span> 
          <span class="text-secondary">${logEntry.functionName}():</span> ${logEntry.message}
          ${duration ? `<span class="badge bg-light text-dark">${duration}ms</span>` : ''}
        </div>`;
        timeline.innerHTML = entryHtml + timeline.innerHTML;
      }
    };

    const updateMetrics = async () => {
      const getVal = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      getVal('dbg-browser', navigator.userAgent.split(' ')[0] || 'Unknown');
      getVal('dbg-platform', navigator.platform || 'Unknown');
      getVal('dbg-secure', window.isSecureContext ? 'Secure' : 'Unsecure');
      getVal('dbg-lib', typeof Html5Qrcode !== 'undefined' ? 'v2.3.8 (unpkg)' : 'Not Loaded');
      getVal('dbg-cam-count', state.availableCameras.length);
      getVal('dbg-active-idx', state.activeCameraIndex);
      getVal('dbg-device-id', preflightDeviceId || 'None');
      getVal('dbg-status', state.cameraRunning ? 'Running' : 'Stopped');

      // Update Camera Permission state
      if (navigator.permissions && typeof navigator.permissions.query === 'function') {
        try {
          const res = await navigator.permissions.query({ name: 'camera' });
          getVal('dbg-permission', res.state);
        } catch (_) {
          getVal('dbg-permission', 'Preflight Required');
        }
      } else {
        getVal('dbg-permission', 'Unsupported');
      }
    };

    const recordError = (funcName, error) => {
      addLog('error', funcName, error.message, 0, error);
      const display = document.getElementById('dbg-error-display');
      if (display) {
        display.innerHTML = `<div class="text-danger fw-bold">[${funcName}] ${error.name}</div>
        <div style="font-size:0.6rem;">${error.message}</div>
        <pre class="m-0 p-1 bg-dark text-white rounded mt-1" style="font-size:0.55rem; max-height: 50px;">${error.stack || 'No trace'}</pre>`;
      }
    };

    // Diagnostic Tests
    const testBrowserCompatibility = () => {
      const startTime = Date.now();
      try {
        const support = {
          mediaDevices: !!navigator.mediaDevices,
          getUserMedia: navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === 'function',
          permissionsAPI: !!navigator.permissions,
          secureContext: !!window.isSecureContext,
          barcodeDetector: 'BarcodeDetector' in window,
          html5Qrcode: typeof Html5Qrcode !== 'undefined'
        };
        const pass = support.mediaDevices && support.getUserMedia && support.secureContext && support.html5Qrcode;
        addLog('success', 'testBrowserCompatibility', `Passed: ${pass} | Metrics: ${JSON.stringify(support)}`, Date.now() - startTime);
        return pass;
      } catch (err) {
        recordError('testBrowserCompatibility', err);
        return false;
      }
    };

    const testCameraPermission = async () => {
      const startTime = Date.now();
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        addLog('success', 'testCameraPermission', 'Preflight track permission GRANTED.', Date.now() - startTime);
        stream.getTracks().forEach(track => {
          track.stop();
          addLog('info', 'testCameraPermission', `Stopped track: ${track.label}`);
        });
        await updateMetrics();
        return true;
      } catch (err) {
        recordError('testCameraPermission', err);
        return false;
      }
    };

    const testCameraEnumeration = async () => {
      const startTime = Date.now();
      try {
        const cameras = await Html5Qrcode.getCameras();
        addLog('success', 'testCameraEnumeration', `Enumerated ${cameras.length} camera(s) successfully.`, Date.now() - startTime);
        await updateMetrics();
        return true;
      } catch (err) {
        recordError('testCameraEnumeration', err);
        return false;
      }
    };

    const testPreflightDevice = () => {
      const startTime = Date.now();
      try {
        if (!preflightDeviceId) {
          throw new Error("No preflightDeviceId has been captured yet. Perform permission test first.");
        }
        addLog('success', 'testPreflightDevice', `Preflight Device ID: ${preflightDeviceId}`, Date.now() - startTime);
        return true;
      } catch (err) {
        recordError('testPreflightDevice', err);
        return false;
      }
    };

    const testStartCamera = async () => {
      const startTime = Date.now();
      try {
        if (state.cameraRunning) {
          throw new Error("Camera is already active. Stop camera first.");
        }
        
        const container = document.getElementById('interactive-camera-scanner');
        if (container) container.innerHTML = '';
        const tempScanner = new Html5Qrcode('interactive-camera-scanner');
        
        let constraint = preflightDeviceId || { facingMode: 'environment' };
        if (state.availableCameras.length > 0 && state.availableCameras[state.activeCameraIndex]) {
          constraint = state.availableCameras[state.activeCameraIndex].id;
        }

        await tempScanner.start(
          constraint,
          { fps: 10, qrbox: 250 },
          () => {}, // Silence scan callback for test
          () => {}
        );

        addLog('success', 'testStartCamera', 'Camera preview loaded successfully.', Date.now() - startTime);
        
        // Save back reference for stop test
        html5QrCode = tempScanner;
        state.cameraRunning = true;
        await updateMetrics();
        return true;
      } catch (err) {
        recordError('testStartCamera', err);
        return false;
      }
    };

    const testStopCamera = async () => {
      const startTime = Date.now();
      try {
        if (!html5QrCode || !state.cameraRunning) {
          throw new Error("No active scanner instance found to stop.");
        }
        await html5QrCode.stop();
        state.cameraRunning = false;
        html5QrCode = null;
        
        const container = document.getElementById('interactive-camera-scanner');
        if (container) container.innerHTML = '';

        addLog('success', 'testStopCamera', 'Scanner stopped and resource cleaned.', Date.now() - startTime);
        await updateMetrics();
        return true;
      } catch (err) {
        recordError('testStopCamera', err);
        return false;
      }
    };

    const stressTestCamera = async () => {
      addLog('info', 'stressTestCamera', 'Initiating camera stress test (5 iterations)...');
      let passes = 0;
      let totalTime = 0;
      
      for (let i = 1; i <= 5; i++) {
        addLog('info', 'stressTestCamera', `Iteration ${i}/5 starting...`);
        const startResult = await testStartCamera();
        if (startResult) {
          passes++;
          await new Promise(r => setTimeout(r, 500)); // Let preview render
          await testStopCamera();
        } else {
          addLog('error', 'stressTestCamera', `Iteration ${i}/5 failed at start.`);
        }
      }
      
      addLog('success', 'stressTestCamera', `Stress test completed. Passes: ${passes}/5.`, totalTime);
    };

    const testScanner = async () => {
      const startTime = Date.now();
      try {
        if (state.cameraRunning) await testStopCamera();
        
        const container = document.getElementById('interactive-camera-scanner');
        if (container) container.innerHTML = '';
        const diagScanner = new Html5Qrcode('interactive-camera-scanner');

        let frameCount = 0;
        let decodes = 0;
        
        let constraint = preflightDeviceId || { facingMode: 'environment' };
        if (state.availableCameras.length > 0 && state.availableCameras[state.activeCameraIndex]) {
          constraint = state.availableCameras[state.activeCameraIndex].id;
        }

        await diagScanner.start(
          constraint,
          { fps: 10, qrbox: 250 },
          (text) => {
            decodes++;
            addLog('success', 'testScanner', `QR Decoded: ${text} (Total decodes this session: ${decodes})`);
            showToast('info', `Scan Decoded: ${text}`);
          },
          () => {
            frameCount++;
          }
        );

        addLog('success', 'testScanner', 'Scanner diagnostic feed active.', Date.now() - startTime);
        html5QrCode = diagScanner;
        state.cameraRunning = true;
        await updateMetrics();
        return true;
      } catch (err) {
        recordError('testScanner', err);
        return false;
      }
    };

    const testScannerContainer = () => {
      const startTime = Date.now();
      try {
        const container = document.getElementById('interactive-camera-scanner');
        if (!container) throw new Error("DOM container #interactive-camera-scanner not found.");
        const bounds = container.getBoundingClientRect();
        addLog('success', 'testScannerContainer', `Container ok. Size: ${bounds.width}px x ${bounds.height}px`, Date.now() - startTime);
        return true;
      } catch (err) {
        recordError('testScannerContainer', err);
        return false;
      }
    };

    const performanceTest = async () => {
      const startTime = Date.now();
      addLog('info', 'performanceTest', 'Measuring camera hardware initialize latency...');
      const success = await testCameraPermission();
      if (success) {
        addLog('success', 'performanceTest', 'Performance measurement complete.', Date.now() - startTime);
      } else {
        addLog('error', 'performanceTest', 'Performance measurement failed due to permission reject.');
      }
    };

    const exportLogs = () => {
      try {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(logs, null, 2));
        const dlAnchorElem = document.createElement('a');
        dlAnchorElem.setAttribute("href",     dataStr);
        dlAnchorElem.setAttribute("download", `bvc_camera_diagnostic_${Date.now()}.json`);
        dlAnchorElem.click();
        addLog('success', 'exportLogs', 'Logs exported successfully.');
      } catch (err) {
        recordError('exportLogs', err);
      }
    };

    const resetTest = async () => {
      try {
        if (state.cameraRunning) {
          await testStopCamera();
        }
        logs.length = 0;
        const timeline = document.getElementById('dbg-timeline');
        if (timeline) timeline.innerHTML = '';
        const display = document.getElementById('dbg-error-display');
        if (display) display.textContent = 'None recorded.';
        addLog('info', 'resetTest', 'Diagnostic panel state has been fully reset.');
        await updateMetrics();
      } catch (err) {
        recordError('resetTest', err);
      }
    };

    // Bind Developer UI Events
    const initBindings = () => {
      if (!window.DEBUG_MODE) {
        const trig = document.getElementById('camera-debug-trigger-container');
        if (trig) trig.style.display = 'none';
        return;
      }

      const getEl = id => document.getElementById(id);
      const onClick = (id, fn) => { const el = getEl(id); if (el) el.addEventListener('click', fn); };

      onClick('btn-open-camera-debug', () => { getEl('camera-debug-panel').style.display = 'flex'; updateMetrics(); });
      onClick('btn-close-camera-debug', () => { getEl('camera-debug-panel').style.display = 'none'; });
      
      onClick('dbg-btn-test-1', testBrowserCompatibility);
      onClick('dbg-btn-test-2', testCameraPermission);
      onClick('dbg-btn-test-3', testCameraEnumeration);
      onClick('dbg-btn-test-4', testPreflightDevice);
      onClick('dbg-btn-test-5', testStartCamera);
      onClick('dbg-btn-test-6', testStopCamera);
      onClick('dbg-btn-test-7', stressTestCamera);
      onClick('dbg-btn-test-8', testScanner);
      onClick('dbg-btn-test-9', testScannerContainer);
      onClick('dbg-btn-test-10', performanceTest);

      onClick('dbg-btn-clear-error', () => { getEl('dbg-error-display').textContent = 'None recorded.'; });
      onClick('dbg-btn-clear-timeline', () => { getEl('dbg-timeline').innerHTML = ''; });
      onClick('dbg-btn-export-logs', exportLogs);
      onClick('dbg-btn-reset-test', resetTest);
      
      addLog('info', 'initBindings', 'Diagnostic Suite fully loaded. Ready for test iterations.');
      updateMetrics();
    };

    return {
      init: initBindings,
      addLog,
      updateMetrics
    };
  })();

  // ==========================================================================
  //  LIBRARY VERSION RUNTIME VALIDATION (Task 6 & 8)
  // ==========================================================================
  window.testLibraryVersion = () => {
    console.log("=== testLibraryVersion() ===");
    console.log("Library Version Selected:", window.QR_SCANNER_VERSION);
    console.log("Html5Qrcode Exists:", typeof Html5Qrcode !== 'undefined');
    if (typeof Html5Qrcode !== 'undefined') {
      console.log("Available APIs:", Object.keys(Html5Qrcode));
    }
    console.log("Constructor Exists:", typeof Html5Qrcode === 'function');
    console.log("Scanner Exists:", typeof Html5QrcodeScanner !== 'undefined');
    console.log("Ready State: OK");
    console.log("============================");

    // Task 8: Automatic Compatibility Report
    console.log("=== COMPATIBILITY REPORT ===");
    console.log("Browser:", navigator.userAgent.split(' ')[0]);
    console.log("OS/Platform:", navigator.platform);
    console.log("Library Version:", window.QR_SCANNER_VERSION);
    console.log("CDN Provider:", window.CDN_PROVIDER);
    console.log("Camera API Supported:", !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
    console.log("Permission API Supported:", !!navigator.permissions);
    
    const score = [
      typeof Html5Qrcode !== 'undefined',
      !!navigator.mediaDevices,
      window.isSecureContext
    ].filter(Boolean).length / 3 * 100;
    console.log(`Compatibility Score: ${Math.round(score)}%`);
    console.log("Recommended Version: 2.3.7 (Stable)");
    console.log("============================");
  };

  // ==========================================================================
  //  PUBLIC API
  // ==========================================================================
  return {
    initializeCoordinatorUI: init,
    showToast,
    resetUI,
  };
})();

// Boot on DOM ready
if (document.readyState === 'complete' || document.readyState === 'interactive') {
  CoordinatorUI.initializeCoordinatorUI();
} else {
  document.addEventListener('DOMContentLoaded', () => CoordinatorUI.initializeCoordinatorUI());
}
</script>

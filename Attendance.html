<div class="card h-100 border-0 shadow-sm module-card">
  <div class="card-header bg-white border-bottom-0 pt-4 px-4 d-flex justify-content-between align-items-center">
    <h5 class="fw-semibold mb-0">Attendance Tracking</h5>
    <button class="btn btn-success" data-action="mark-attendance"><i class="bi bi-qr-code-scan me-2"></i>Mark Attendance</button>
  </div>
  <div class="card-body p-4">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Record ID</th>
            <th>Student Roll</th>
            <th>Event ID</th>
            <th>Status</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody id="attendance-table-body">
          <tr><td colspan="5" class="text-center text-muted py-5">No attendance records found</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

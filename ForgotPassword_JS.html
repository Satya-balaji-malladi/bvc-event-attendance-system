<script>
  document.addEventListener('DOMContentLoaded', function () {
    'use strict';

    // Interactive Lifecycle Management Variables
    let currentStep = 1;
    let cachedEmployeeId = '';
    let cachedOtp = '';
    let otpCountdownInterval = null;
    const OTP_DURATION_SECONDS = 300; 

    // DOM Element Interface Selectors
    const wizardSubtitle = document.getElementById('wizardSubtitle');
    const alertContainer = document.getElementById('alertContainer');
    const alertMessage = document.getElementById('alertMessage');
    const alertIcon = document.getElementById('alertIcon');
    const alertText = document.getElementById('alertText');
    const badgeContainer = document.getElementById('badgeContainer');

    // Steps Multiforms Elements Context
    const step1Form = document.getElementById('step1Form');
    const step2Form = document.getElementById('step2Form');
    const step3Form = document.getElementById('step3Form');

    // Controls
    const employeeId = document.getElementById('employeeId');
    const otpCode = document.getElementById('otpCode');
    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const timerText = document.getElementById('timerText');
    const btnResendOtp = document.getElementById('btnResendOtp');
    const strengthProgressBar = document.getElementById('strengthProgressBar');
    const strengthLabel = document.getElementById('strengthLabel');
    const btnReturnToLogin = document.getElementById('btnReturnToLogin');

    /**
     * Toggles wizard containers view nodes visibility mapping
     */
    function showStep(step) {
      hideAlert();
      currentStep = step;
      
      document.querySelectorAll('.wizard-step').forEach(el => el.classList.add('d-none'));
      document.getElementById(`step${step}Container`).classList.remove('d-none');
      
      if (step === 1) {
        wizardSubtitle.textContent = 'Recover your account securely';
        badgeContainer.classList.remove('d-none');
      } else if (step === 2) {
        wizardSubtitle.textContent = 'Enter verification code';
        badgeContainer.classList.remove('d-none');
      } else if (step === 3) {
        wizardSubtitle.textContent = 'Establish credentials';
        badgeContainer.classList.remove('d-none');
      } else if (step === 4) {
        wizardSubtitle.textContent = 'Verification success';
        badgeContainer.classList.add('d-none');
      }
    }

    /**
     * Controls element active/disabled status parameters while loading executes
     */
    function setLoading(isLoading, stepNum) {
      const targetForm = document.getElementById(`step${stepNum}Form`);
      if (!targetForm) return;

      const inputs = targetForm.querySelectorAll('input, button');
      inputs.forEach(control => control.disabled = isLoading);

      const submitBtn = document.getElementById(`btnStep${stepNum}Submit`);
      if (submitBtn) {
        submitBtn.disabled = isLoading;
        const spinner = submitBtn.querySelector('.spinner-border');
        const textLabel = submitBtn.querySelector('.btn-label-text');
        
        if (isLoading) {
          textLabel.dataset.originalText = textLabel.textContent;
          textLabel.textContent = 'Please wait...';
          spinner.classList.remove('d-none');
        } else {
          textLabel.textContent = textLabel.dataset.originalText || 'Continue';
          spinner.classList.add('d-none');
        }
      }

      if (!isLoading && stepNum === 2) {
        if (timerText.dataset.expired !== "true") {
          btnResendOtp.disabled = true;
        }
      }
    }

    function validateField(inputElement, isValid) {
      if (isValid) {
        inputElement.classList.remove('is-invalid');
      } else {
        inputElement.classList.add('is-invalid');
      }
    }

    function showAlert(message, statusType = 'danger') {
      alertText.textContent = message;
      alertMessage.classList.remove('alert-danger', 'alert-success');
      
      if (statusType === 'success') {
        alertMessage.classList.add('alert-success');
        alertIcon.className = 'bi bi-check-circle-fill flex-shrink-0';
      } else {
        alertMessage.classList.add('alert-danger');
        alertIcon.className = 'bi bi-exclamation-triangle-fill flex-shrink-0';
      }

      alertContainer.classList.remove('d-none');
      alertContainer.classList.add('alert-animate');
    }

    function hideAlert() {
      alertContainer.classList.add('d-none');
      alertContainer.classList.remove('alert-animate');
    }

    // Step Navigation Backwards Listeners Routing
    document.querySelectorAll('.btn-wizard-back').forEach(btn => {
      btn.addEventListener('click', function () {
        if (currentStep === 2) {
          clearInterval(otpCountdownInterval);
          showStep(1);
        } else if (currentStep === 3) {
          showStep(2);
        }
      });
    });

    if (btnReturnToLogin) {
      btnReturnToLogin.addEventListener('click', function() {
        google.script.run
          .withSuccessHandler(function(url) {
            window.top.location.href = url + '?page=login';
          })
          .getScriptUrl();
      });
    }

    /* ==========================================================================
       STEP 1: Identification & Code Request Trigger
       ========================================================================== */
    step1Form.addEventListener('submit', function (event) {
      event.preventDefault();
      const isIdValid = employeeId.value.trim() !== '';
      validateField(employeeId, isIdValid);

      if (isIdValid) {
        cachedEmployeeId = employeeId.value.trim();
        generateOTP();
      }
    });

    function generateOTP() {
      setLoading(true, 1);
      hideAlert();

      // Dispatches request directly to global routing hooks
      google.script.run
        .withSuccessHandler(function (response) {
          setLoading(false, 1);
          if (response.success) {
            showStep(2);
            startOtpTimer(OTP_DURATION_SECONDS);
            showAlert(response.message || 'OTP verification code sent safely.', 'success');
          } else {
            showAlert(response.message || 'Employee lookup verification check rejected.');
          }
        })
        .withFailureHandler(function (error) {
          setLoading(false, 1);
          showAlert('Unable to establish transmission with backend service.');
        })
        .forgotPassword(cachedEmployeeId);
    }

    /* ==========================================================================
       STEP 2: OTP Token Verification Subsystem
       ========================================================================== */
    step2Form.addEventListener('submit', function (event) {
      event.preventDefault();
      const isOtpValid = otpCode.value.trim().length === 6 && /^\d+$/.test(otpCode.value.trim());
      validateField(otpCode, isOtpValid);

      if (isOtpValid) {
        cachedOtp = otpCode.value.trim();
        verifyOTP();
      }
    });

    if (btnResendOtp) {
      btnResendOtp.addEventListener('click', function () {
        if (this.disabled) return;
        generateOTP();
      });
    }

    function startOtpTimer(durationSeconds) {
      clearInterval(otpCountdownInterval);
      timerText.dataset.expired = "false";
      btnResendOtp.disabled = true;
      
      let timeRemaining = durationSeconds;

      const updateTimerUI = () => {
        const minutes = Math.floor(timeRemaining / 60);
        const seconds = timeRemaining % 60;
        timerText.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        
        if (timeRemaining <= 0) {
          clearInterval(otpCountdownInterval);
          timerText.dataset.expired = "true";
          timerText.textContent = "00:00";
          btnResendOtp.disabled = false;
        }
        timeRemaining--;
      };

      updateTimerUI();
      otpCountdownInterval = setInterval(updateTimerUI, 1000);
    }

    function verifyOTP() {
      setLoading(true, 2);
      hideAlert();

      google.script.run
        .withSuccessHandler(function (response) {
          setLoading(false, 2);
          if (response.success) {
            clearInterval(otpCountdownInterval);
            showStep(3);
            showAlert('OTP token confirmed successfully.', 'success');
          } else {
            showAlert(response.message || 'Invalid or expired verification token code.');
          }
        })
        .withFailureHandler(function (error) {
          setLoading(false, 2);
          showAlert('Token operational processing timeout failure.');
        })
        .verifyOTP(cachedEmployeeId, cachedOtp);
    }

    /* ==========================================================================
       STEP 3: Password Modifications Matrix
       ========================================================================== */
    const passwordFields = [newPassword, confirmPassword];
    
    document.querySelectorAll('.toggle-password-visibility').forEach((btn, index) => {
      btn.addEventListener('click', function () {
        const targetInput = passwordFields[index];
        const isPassword = targetInput.getAttribute('type') === 'password';
        targetInput.setAttribute('type', isPassword ? 'text' : 'password');
        
        const toggleIcon = this.querySelector('.password-toggle-icon');
        toggleIcon.classList.toggle('bi-eye');
        toggleIcon.classList.toggle('bi-eye-slash');
        this.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
      });
    });

    newPassword.addEventListener('input', function () {
      const strength = evaluatePasswordStrength(this.value);
      updateStrengthMeterIndicator(strength);
    });

    confirmPassword.addEventListener('input', function () {
      if (this.value !== '') {
        validateField(confirmPassword, newPassword.value === this.value);
      }
    });

    step3Form.addEventListener('submit', function (event) {
      event.preventDefault();
      
      const isPassNotEmpty = newPassword.value.trim() !== '';
      const isMatch = newPassword.value === confirmPassword.value;
      
      validateField(newPassword, isPassNotEmpty);
      validateField(confirmPassword, isPassNotEmpty && isMatch);

      if (isPassNotEmpty && isMatch) {
        resetPassword();
      }
    });

    function evaluatePasswordStrength(passwordVal) {
      let score = 0;
      if (!passwordVal) return score;

      if (passwordVal.length >= 8) score++;
      if (/[A-Z]/.test(passwordVal)) score++;
      if (/[a-z]/.test(passwordVal)) score++;
      if (/[0-9]/.test(passwordVal)) score++;
      if (/[^A-Za-z0-9]/.test(passwordVal)) score++;

      return score;
    }

    function updateStrengthMeterIndicator(score) {
      strengthProgressBar.classList.remove('bg-danger', 'bg-warning', 'bg-success');
      
      if (score <= 2) {
        strengthProgressBar.style.width = '33%';
        strengthProgressBar.classList.add('bg-danger');
        strengthLabel.textContent = 'Weak';
        strengthLabel.className = 'fw-semibold text-danger';
      } else if (score === 3 || score === 4) {
        strengthProgressBar.style.width = '66%';
        strengthProgressBar.classList.add('bg-warning');
        strengthLabel.textContent = 'Medium';
        strengthLabel.className = 'fw-semibold text-warning';
      } else {
        strengthProgressBar.style.width = '100%';
        strengthProgressBar.classList.add('bg-success');
        strengthLabel.textContent = 'Strong';
        strengthLabel.className = 'fw-semibold text-success';
      }
    }

    function resetPassword() {
      setLoading(true, 3);
      hideAlert();

      google.script.run
        .withSuccessHandler(function (response) {
          setLoading(false, 3);
          if (response.success) {
            showStep(4);
          } else {
            showAlert(response.message || 'Credentials policy verification error.');
          }
        })
        .withFailureHandler(function (error) {
          setLoading(false, 3);
          showAlert('Failed to update system user password model changes.');
        })
        .recoverPassword(cachedEmployeeId, cachedOtp, newPassword.value);
    }
  });
</script>

<div class="card h-100 border-0 shadow-sm module-card">
  <div class="card-header bg-white border-bottom-0 pt-4 px-4 d-flex justify-content-between align-items-center">
    <h5 class="fw-semibold mb-0">System Reports</h5>
    <button class="btn btn-outline-secondary"><i class="bi bi-download me-2"></i>Export All</button>
  </div>
  <div class="card-body p-4">
    <div class="row g-4">
      <div class="col-md-6 col-lg-4">
        <div class="card border">
          <div class="card-body text-center py-4">
            <i class="bi bi-file-earmark-bar-graph fs-1 text-primary mb-3"></i>
            <h6>Event Report</h6>
            <button class="btn btn-sm btn-primary mt-2">Generate</button>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-4">
        <div class="card border">
          <div class="card-body text-center py-4">
            <i class="bi bi-file-earmark-person fs-1 text-info mb-3"></i>
            <h6>Student Report</h6>
            <button class="btn btn-sm btn-info text-white mt-2">Generate</button>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-4">
        <div class="card border">
          <div class="card-body text-center py-4">
            <i class="bi bi-file-earmark-spreadsheet fs-1 text-success mb-3"></i>
            <h6>Department Report</h6>
            <button class="btn btn-sm btn-success mt-2">Generate</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BVC Event Attendance Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
  
  <?!= include('login_css'); ?>
</head>
<body>

  <main class="login-wrapper d-flex align-items-center justify-content-center p-3" role="main">
    <div class="login-overlay"></div>
    <script>
      // Inject backend URL globally to allow synchronous redirects during user actions
      window.APP_SCRIPT_URL = "<?= getScriptUrl() ?>";
    </script>
    
    <div class="card login-card border-0 shadow-lg">
      <div class="card-body p-4 p-sm-5">
        
        <header class="text-center mb-4">
          <img src="https://via.placeholder.com/150x85?text=BVC+Logo" alt="BVC Engineering College Logo" class="college-logo mb-3 img-fluid">
          <h1 class="institution-title mb-1">BVC Engineering College</h1>
          <h2 class="system-title mb-2">Event Attendance Management System</h2>
          <p class="subtitle text-muted small">Secure Staff Login</p>
        </header>
        
        <hr class="mb-4">
        
        <div id="alertContainer" class="d-none" role="alert" aria-live="polite">
          <div id="alertMessage" class="alert alert-danger d-flex align-items-center gap-2 py-2 px-3 mb-4 rounded-3 small">
            <i class="bi bi-exclamation-triangle-fill flex-shrink-0" id="alertIcon"></i>
            <span id="alertText"></span>
          </div>
        </div>

        <form id="loginForm" novalidate>
          
          <div class="mb-3">
            <label for="employeeId" class="form-label text-secondary fw-semibold small">Employee ID</label>
            <div class="input-group has-validation">
              <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
              <input 
                type="text" 
                class="form-control border-start-0" 
                id="employeeId" 
                placeholder="Enter Employee ID" 
                required 
                aria-required="true"
                autocomplete="username"
              >
              <div class="invalid-feedback text-start">
                Employee ID is required.
              </div>
            </div>
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <label for="password" class="form-label text-secondary fw-semibold small mb-0">Password</label>
              <a href="javascript:void(0)" id="forgotPasswordLink" class="forgot-link small text-decoration-none">Forgot Password?</a>
            </div>
            <div class="input-group has-validation">
              <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-lock"></i></span>
              <input 
                type="password" 
                class="form-control border-start-0 border-end-0" 
                id="password" 
                placeholder="Enter Password" 
                required 
                aria-required="true"
                autocomplete="current-password"
              >
              <button 
                class="btn btn-outline-secondary border-start-0 bg-white text-muted" 
                type="button" 
                id="togglePassword"
                aria-label="Show password"
              >
                <i class="bi bi-eye" id="togglePasswordIcon"></i>
              </button>
              <div class="invalid-feedback text-start">
                Password is required.
              </div>
            </div>
          </div>

          <button type="submit" id="btnSubmit" class="btn btn-primary w-100 py-2 mt-3 fw-semibold text-uppercase">
            <span id="btnText">Login</span>
            <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
          </button>
          
        </form>

        <div class="text-center mt-4">
          <span class="badge bg-light text-secondary border py-1.5 px-2.5">v1.0.0</span>
        </div>

      </div>
    </div>
    
    <footer class="login-footer text-center w-100 position-absolute bottom-0 py-3">
      <p class="text-white-50 small mb-0">&copy; 2026 BVC Engineering College. All rights reserved.</p>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  
  <?!= include('login_js'); ?>
</body>
</html>

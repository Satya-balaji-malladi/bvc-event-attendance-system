<header class="top-header sticky-top bg-white border-bottom">
  <div class="d-flex align-items-center justify-content-between h-100 px-3 px-md-4">
    <div class="d-flex align-items-center">
      <button class="btn btn-link text-dark p-0 me-3" id="toggle-sidebar">
        <i class="bi bi-list fs-3"></i>
      </button>
      
      <!-- Breadcrumb Area -->
      <nav aria-label="breadcrumb" class="d-none d-md-block">
        <ol class="breadcrumb mb-0" id="breadcrumb-container">
          <li class="breadcrumb-item"><a href="#" class="text-decoration-none text-muted" id="breadcrumb-parent">Home</a></li>
          <li class="breadcrumb-item active" aria-current="page" id="current-page-title">Dashboard</li>
        </ol>
      </nav>
    </div>

    <!-- Header Right Actions -->
    <div class="d-flex align-items-center gap-3">
      
      <div class="d-none d-md-flex flex-column text-end">
        <small class="text-muted" id="current-date"></small>
        <small class="text-muted fw-bold" id="current-time"></small>
      </div>

      <!-- Notifications -->
      <div class="dropdown">
        <button class="btn btn-link text-dark p-0 position-relative" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-bell fs-5"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0 notification-dropdown">
          <li><h6 class="dropdown-header">Notifications</h6></li>
          <li><div class="dropdown-item py-2 text-muted text-center" id="notification-placeholder">No notifications</div></li>
        </ul>
      </div>

      <!-- User Profile -->
      <div class="dropdown">
        <button class="btn btn-link text-dark text-decoration-none p-0 d-flex align-items-center gap-2" data-bs-toggle="dropdown" aria-expanded="false">
          <div class="avatar bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;">
            <span id="user-initials">--</span>
          </div>
          <div class="d-none d-md-block text-start lh-1">
            <div class="fw-semibold text-dark fs-6" id="user-name">Loading...</div>
            <small class="text-muted" id="user-role">Loading...</small>
          </div>
          <i class="bi bi-chevron-down d-none d-md-block fs-7 ms-1"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
          <li><a class="dropdown-item py-2" href="#" data-action="profile"><i class="bi bi-person me-2"></i> My Profile</a></li>
          <li><a class="dropdown-item py-2" href="#" data-action="settings"><i class="bi bi-gear me-2"></i> Settings</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item py-2 text-danger" href="#" data-page="logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
        </ul>
      </div>
    </div>
  </div>
</header>

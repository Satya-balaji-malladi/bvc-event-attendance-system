<style>
/* =============================================================================
   BVC Coordinator Terminal – Premium Responsive CSS Design System
   Mobile-first, scales up to full desktop dashboard
============================================================================= */

@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

/* ---------- CSS Variables ---------- */
:root {
  --c-primary:        #2563EB;
  --c-primary-dark:   #1D4ED8;
  --c-primary-light:  #EFF6FF;
  --c-success:        #10B981;
  --c-success-light:  #ECFDF5;
  --c-warning:        #F59E0B;
  --c-warning-light:  #FFFBEB;
  --c-danger:         #EF4444;
  --c-danger-light:   #FEF2F2;
  --c-purple:         #8B5CF6;
  --c-purple-light:   #F5F3FF;

  --c-bg:             #F1F5F9;
  --c-bg-dark:        #0F172A;
  --c-surface:        #FFFFFF;
  --c-border:         #E2E8F0;
  --c-text-primary:   #0F172A;
  --c-text-secondary: #64748B;
  --c-text-muted:     #94A3B8;

  --radius-sm:  8px;
  --radius-md:  12px;
  --radius-lg:  16px;
  --radius-xl:  20px;
  --radius-2xl: 24px;

  --shadow-sm:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:  0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:  0 10px 30px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.04);
  --shadow-xl:  0 20px 60px rgba(0,0,0,0.12);

  --grad-primary:   linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
  --grad-success:   linear-gradient(135deg, #10B981 0%, #059669 100%);
  --grad-danger:    linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
  --grad-header:    linear-gradient(135deg, #1E3A8A 0%, #2563EB 60%, #3B82F6 100%);

  --font-body:    'Plus Jakarta Sans', sans-serif;
  --font-display: 'Outfit', sans-serif;

  --header-h: 64px;
  --trans-fast:   150ms ease;
  --trans-normal: 250ms ease;
  --trans-slow:   400ms ease;
}

/* ---------- Global Reset ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { -webkit-text-size-adjust: 100%; }

body {
  background-color: var(--c-bg-dark);
  font-family: var(--font-body);
  color: var(--c-text-primary);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ============================================================
   COORD APP SHELL
============================================================ */
.coord-app {
  background: var(--c-bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ============================================================
   HEADER
============================================================ */
.coord-header {
  background: var(--grad-header);
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--header-h);
  box-shadow: 0 2px 20px rgba(37,99,235,0.4);
}

.coord-header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100%;
  padding: 0 16px;
  gap: 12px;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.coord-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.coord-brand-logo {
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.coord-brand-name {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1rem;
  color: #fff;
  letter-spacing: -0.3px;
  display: block;
}

.coord-brand-sub {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.65);
  font-weight: 500;
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.coord-header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* Online/Offline Chip */
.coord-status-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 50px;
  background: rgba(16,185,129,0.2);
  border: 1px solid rgba(16,185,129,0.35);
  font-size: 0.68rem;
  font-weight: 700;
  color: #6EE7B7;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: var(--trans-normal);
}
.coord-status-chip.offline {
  background: rgba(239,68,68,0.2);
  border-color: rgba(239,68,68,0.35);
  color: #FCA5A5;
}
.coord-status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #10B981;
  animation: pulse-dot 1.8s infinite;
}
.coord-status-chip.offline .coord-status-dot {
  background: #EF4444;
  animation: none;
}
@keyframes pulse-dot {
  0%, 100% { transform: scale(0.85); opacity: 0.7; }
  50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 6px #10B981; }
}

/* Icon buttons (header) */
.coord-icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  transition: var(--trans-fast);
}
.coord-icon-btn:hover { background: rgba(255,255,255,0.2); }
.coord-icon-btn:active { transform: scale(0.94); }
.coord-icon-btn-danger {
  background: rgba(239,68,68,0.2);
  border-color: rgba(239,68,68,0.35);
  color: #FCA5A5;
}
.coord-icon-btn-danger:hover { background: rgba(239,68,68,0.35); }

/* ============================================================
   MAIN LAYOUT  GRID
============================================================ */
.coord-main {
  flex: 1;
  padding: 16px;
}

.coord-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  max-width: 1400px;
  margin: 0 auto;
}

/* On lg screens: side-by-side columns */
@media (min-width: 992px) {
  .coord-main { padding: 20px 24px; }
  .coord-grid { grid-template-columns: 1fr 1fr; align-items: start; }
  .coord-col-right { position: sticky; top: calc(var(--header-h) + 20px); max-height: calc(100vh - var(--header-h) - 40px); }
}

@media (min-width: 1280px) {
  .coord-grid { grid-template-columns: 480px 1fr; gap: 24px; }
}

/* ============================================================
   BASE CARD
============================================================ */
.coord-card {
  background: var(--c-surface);
  border-radius: var(--radius-xl);
  border: 1px solid var(--c-border);
  box-shadow: var(--shadow-md);
  overflow: hidden;
}

.coord-section-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--c-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

/* ============================================================
   EVENT CARD
============================================================ */
.coord-event-card {
  background: var(--grad-primary);
  border-color: transparent;
  padding: 16px;
  margin-bottom: 0;
  position: relative;
  overflow: hidden;
}

.coord-event-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.06) 0%, transparent 50%);
  pointer-events: none;
}

.coord-event-card-inner {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.coord-event-label {
  font-size: 0.68rem;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  display: block;
  margin-bottom: 4px;
}

.coord-event-title {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  color: #fff;
  margin: 0;
  line-height: 1.3;
}

.coord-event-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 6px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.65);
  font-weight: 500;
}

.coord-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 50px;
  font-size: 0.68rem;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}
.coord-badge-active { background: rgba(16,185,129,0.25); color: #6EE7B7; border: 1px solid rgba(16,185,129,0.4); }
.coord-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: #6EE7B7; animation: pulse-dot 1.8s infinite; }

.coord-event-meta-bar {
  border-top: 1px solid rgba(255,255,255,0.12);
  padding-top: 10px;
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.65);
  font-weight: 500;
  gap: 8px;
  flex-wrap: wrap;
}

/* ============================================================
   STATS GRID
============================================================ */
.coord-stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

@media (min-width: 480px) {
  .coord-stats-grid { grid-template-columns: repeat(4, 1fr); }
}

.coord-stat-card {
  background: var(--c-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--c-border);
  box-shadow: var(--shadow-sm);
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: transform var(--trans-fast), box-shadow var(--trans-fast);
}
.coord-stat-card:active { transform: scale(0.97); }

.coord-stat-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.coord-stat-icon-present   { background: var(--c-success-light); color: var(--c-success); }
.coord-stat-icon-remaining { background: var(--c-warning-light); color: var(--c-warning); }
.coord-stat-icon-total     { background: var(--c-primary-light); color: var(--c-primary); }
.coord-stat-icon-duplicate { background: var(--c-danger-light);  color: var(--c-danger); }
.coord-stat-icon-pct       { background: var(--c-purple-light);  color: var(--c-purple); }

.coord-stat-label {
  display: block;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--c-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.coord-stat-value {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 800;
  color: var(--c-text-primary);
  line-height: 1;
}

/* Percentage card spans full width */
.coord-stat-card-pct {
  grid-column: 1 / -1;
}
@media (min-width: 480px) {
  .coord-stat-card-pct { grid-column: auto; }
}

.coord-progress-bar-bg {
  width: 100%;
  height: 6px;
  background: var(--c-border);
  border-radius: 50px;
  overflow: hidden;
}
.coord-progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--c-purple), #C026D3);
  border-radius: 50px;
  transition: width 0.6s ease;
}

/* ============================================================
   SCANNER CARD
============================================================ */
.coord-scanner-card { padding: 16px; }

.coord-camera-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  gap: 8px;
}

.coord-camera-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.coord-cam-select {
  font-size: 0.78rem;
  font-weight: 600;
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  padding: 5px 8px;
  color: var(--c-text-primary);
  background: var(--c-surface);
  cursor: pointer;
  max-width: 160px;
}

.coord-cam-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--c-border);
  background: var(--c-surface);
  color: var(--c-text-primary);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--trans-fast);
  white-space: nowrap;
}
.coord-cam-btn:hover { background: var(--c-bg); }
.coord-cam-btn:active { transform: scale(0.95); }
.coord-cam-btn-primary {
  background: var(--c-primary);
  border-color: var(--c-primary);
  color: #fff;
}
.coord-cam-btn-primary:hover { background: var(--c-primary-dark); }

/* Camera Viewport */
.coord-viewport {
  position: relative;
  height: 200px;
  background: var(--c-bg-dark);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 14px;
  border: 2px solid #1E293B;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
}

@media (min-width: 992px) { .coord-viewport { height: 240px; } }

/* Corner frame brackets */
.coord-viewport-frame {
  position: absolute;
  inset: 10px;
  pointer-events: none;
  z-index: 5;
}
.coord-viewport-frame .corner {
  position: absolute;
  width: 18px;
  height: 18px;
  border-color: var(--c-primary);
  border-style: solid;
}
.corner.tl { top:0;left:0;   border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.corner.tr { top:0;right:0;  border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.corner.bl { bottom:0;left:0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.corner.br { bottom:0;right:0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

/* Laser sweep line */
.coord-laser {
  position: absolute;
  left: 10px;
  right: 10px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--c-primary), #60A5FA, var(--c-primary), transparent);
  box-shadow: 0 0 8px 2px rgba(59,130,246,0.6);
  z-index: 6;
  animation: laser-scan 2.4s ease-in-out infinite;
  top: 15%;
}
@keyframes laser-scan {
  0%, 100% { transform: translateY(0); opacity: 0.8; }
  50% { transform: translateY(160px); opacity: 1; }
}

/* Placeholder shown when camera inactive */
.coord-viewport-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  z-index: 8;
  background: rgba(15,23,42,0.85);
  transition: opacity var(--trans-normal);
}
.coord-viewport-placeholder i {
  font-size: 2.5rem;
  color: rgba(255,255,255,0.2);
}
.coord-viewport-placeholder span {
  font-size: 0.8rem;
  font-weight: 600;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.coord-viewport-placeholder.hidden { opacity: 0; pointer-events: none; }

/* Input Section */
.coord-input-label {
  display: block;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--c-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.coord-input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.coord-input {
  flex: 1;
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: 2px solid var(--c-border);
  border-radius: var(--radius-md);
  padding: 10px 14px;
  background: var(--c-bg);
  color: var(--c-text-primary);
  transition: border-color var(--trans-fast), box-shadow var(--trans-fast);
  outline: none;
}
.coord-input:focus {
  border-color: var(--c-primary);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  background: #fff;
}
.coord-input::placeholder { color: var(--c-text-muted); font-weight: 500; letter-spacing: 0; }

.coord-submit-btn {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  background: var(--grad-primary);
  border: none;
  color: #fff;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--trans-fast);
  flex-shrink: 0;
}
.coord-submit-btn:disabled { background: var(--c-border); color: var(--c-text-muted); cursor: not-allowed; }
.coord-submit-btn:not(:disabled):hover { filter: brightness(1.1); transform: scale(1.04); }
.coord-submit-btn:not(:disabled):active { transform: scale(0.96); }

.coord-status-text {
  text-align: center;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--c-text-muted);
  letter-spacing: 0.3px;
  min-height: 18px;
}
.coord-status-text.status-success { color: var(--c-success); }
.coord-status-text.status-error { color: var(--c-danger); }
.coord-status-text.status-warn { color: var(--c-warning); }

/* ============================================================
   PREVIEW CARD
============================================================ */
.coord-preview-card { min-height: 90px; }

.coord-preview-idle {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 6px;
  text-align: center;
}
.coord-preview-idle i { font-size: 2rem; color: var(--c-primary); opacity: 0.2; }
.coord-preview-idle strong { font-size: 0.85rem; color: var(--c-text-primary); }
.coord-preview-idle span { font-size: 0.72rem; color: var(--c-text-muted); }

.coord-preview-strip {
  padding: 8px 16px;
  font-size: 0.8rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--c-success-light);
  color: var(--c-success);
  border-bottom: 1px solid rgba(16,185,129,0.15);
}
.coord-preview-strip.strip-duplicate {
  background: var(--c-danger-light);
  color: var(--c-danger);
  border-color: rgba(239,68,68,0.15);
}

.coord-preview-body {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
}

.coord-preview-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--c-success);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  color: #fff;
  flex-shrink: 0;
}
.coord-preview-avatar.av-duplicate { background: var(--c-danger); }

.coord-preview-name {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
  margin-bottom: 2px;
}
.coord-preview-roll {
  display: inline-block;
  background: var(--c-primary-light);
  color: var(--c-primary);
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 50px;
  margin-bottom: 6px;
}
.coord-preview-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 0.72rem;
  color: var(--c-text-secondary);
  font-weight: 500;
}

/* ============================================================
   HISTORY PANEL
============================================================ */
.coord-history-card { padding: 16px; }

.coord-history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.coord-count-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  padding: 0 6px;
  border-radius: 50px;
  background: var(--c-primary);
  color: #fff;
  font-size: 0.68rem;
  font-weight: 700;
}

.coord-history-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.coord-search-wrapper {
  position: relative;
  flex: 1;
  min-width: 160px;
}
.coord-search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--c-text-muted);
  font-size: 0.85rem;
  pointer-events: none;
}
.coord-search-input {
  width: 100%;
  font-size: 0.82rem;
  font-weight: 500;
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  padding: 7px 10px 7px 30px;
  background: var(--c-bg);
  color: var(--c-text-primary);
  outline: none;
  transition: border-color var(--trans-fast), box-shadow var(--trans-fast);
}
.coord-search-input:focus {
  border-color: var(--c-primary);
  box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
  background: #fff;
}

.coord-filter-select {
  font-size: 0.78rem;
  font-weight: 600;
  border: 1px solid var(--c-border);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  background: var(--c-bg);
  color: var(--c-text-primary);
  cursor: pointer;
  outline: none;
  flex-shrink: 0;
}
.coord-filter-select:focus { border-color: var(--c-primary); }

/* History Feed Scroller */
.coord-history-feed {
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 420px;
  padding-right: 2px;
  /* Thin custom scrollbar */
  scrollbar-width: thin;
  scrollbar-color: var(--c-border) transparent;
}
.coord-history-feed::-webkit-scrollbar { width: 4px; }
.coord-history-feed::-webkit-scrollbar-track { background: transparent; }
.coord-history-feed::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 2px; }

@media (min-width: 992px) {

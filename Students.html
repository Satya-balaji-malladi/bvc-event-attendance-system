<div class="card h-100 border-0 shadow-sm module-card">
  <div class="card-header bg-white border-bottom-0 pt-4 px-4 d-flex justify-content-between align-items-center">
    <h5 class="fw-semibold mb-0">Students Directory</h5>
    <button class="btn btn-primary" data-action="add-student"><i class="bi bi-person-plus me-2"></i>Add Student</button>
  </div>
  <div class="card-body p-4">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Roll Number</th>
            <th>Name</th>
            <th>Department</th>
            <th>Year</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="students-table-body">
          <tr><td colspan="5" class="text-center text-muted py-5">No students found</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
/* Enterprise Dashboard Styles */
:root {
  --primary-color: #0d6efd;
  --secondary-color: #6c757d;
  --success-color: #198754;
  --info-color: #0dcaf0;
  --warning-color: #ffc107;
  --danger-color: #dc3545;
  --light-bg: #f8f9fa;
  --dark-text: #212529;
  --border-color: #dee2e6;
  --card-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
  --hover-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
  --transition: all 0.2s ease-in-out;
}

/* Dashboard Container */
.dashboard-wrapper {
  padding: 1.5rem;
  background-color: #f4f6f9;
  min-height: calc(100vh - 60px); /* Assuming navbar height */
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

/* Typography */
.section-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: #495057;
  margin-bottom: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 2px solid var(--primary-color);
  display: inline-block;
  padding-bottom: 0.25rem;
}

/* Welcome Banner */
.welcome-banner {
  background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
  color: white;
  border-radius: 0.5rem;
  padding: 2rem;
  margin-bottom: 2rem;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
}

.welcome-banner::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 50%;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><polygon fill="rgba(255,255,255,0.05)" points="100,0 50,0 100,100"/></svg>') no-repeat right top;
  background-size: cover;
  pointer-events: none;
}

.welcome-banner h2 {
  font-weight: 700;
  margin-bottom: 0.5rem;
}

.welcome-banner p {
  opacity: 0.9;
  margin-bottom: 0;
  font-size: 1.1rem;
}

/* Stat Cards */
.stat-card {
  background: white;
  border-radius: 0.5rem;
  border: 1px solid var(--border-color);
  padding: 1.5rem;
  box-shadow: var(--card-shadow);
  transition: var(--transition);
  height: 100%;
  display: flex;
  align-items: center;
}

.stat-card:hover {
  box-shadow: var(--hover-shadow);
  transform: translateY(-2px);
}

.stat-icon {
  width: 48px;
  height: 48px;
  border-radius: 0.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  margin-right: 1rem;
  flex-shrink: 0;
}

.stat-details {
  flex-grow: 1;
}

.stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--dark-text);
  line-height: 1.2;
}

.stat-label {
  font-size: 0.875rem;
  color: var(--secondary-color);
  font-weight: 500;
  margin-bottom: 0.25rem;
}

.stat-trend {
  font-size: 0.75rem;
  font-weight: 600;
}
.stat-trend.positive { color: var(--success-color); }
.stat-trend.negative { color: var(--danger-color); }

/* Quick Actions */
.quick-action-card {
  background: white;
  border: 1px solid var(--border-color);
  border-radius: 0.5rem;
  padding: 1.25rem;
  text-align: center;
  text-decoration: none;
  color: var(--dark-text);
  transition: var(--transition);
  display: block;
  height: 100%;
}

.quick-action-card:hover {
  background: var(--light-bg);
  border-color: var(--primary-color);
  color: var(--primary-color);
  transform: translateY(-2px);
  box-shadow: var(--card-shadow);
}

.quick-action-icon {
  font-size: 2rem;
  margin-bottom: 0.5rem;
  color: var(--primary-color);
}

.quick-action-title {
  font-weight: 600;
  font-size: 1rem;
  margin-bottom: 0.25rem;
}

.quick-action-desc {
  font-size: 0.8rem;
  color: var(--secondary-color);
}

/* Generic Cards */
.enterprise-card {
  background: white;
  border: 1px solid var(--border-color);
  border-radius: 0.5rem;
  box-shadow: var(--card-shadow);
  margin-bottom: 1.5rem;
  height: calc(100% - 1.5rem);
}

.enterprise-card-header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border-color);
  background-color: rgba(0,0,0,0.02);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top-left-radius: 0.5rem;
  border-top-right-radius: 0.5rem;
}

.enterprise-card-title {
  margin: 0;
  font-size: 1rem;
  font-weight: 600;
  color: #343a40;
}

.enterprise-card-body {
  padding: 1.25rem;
}

/* Tables */
.table-responsive {
  margin-bottom: 0;
}

.table-enterprise {
  width: 100%;
  margin-bottom: 0;
  color: var(--dark-text);
  border-collapse: collapse;
}

.table-enterprise th {
  background-color: var(--light-bg);
  border-bottom: 2px solid var(--border-color);
  border-top: none;
  color: #495057;
  font-weight: 600;
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 0.75rem 1rem;
  vertical-align: bottom;
  white-space: nowrap;
}

.table-enterprise td {
  padding: 1rem;
  vertical-align: middle;
  border-bottom: 1px solid var(--border-color);
  font-size: 0.9rem;
}

.table-enterprise tbody tr:hover {
  background-color: rgba(13, 110, 253, 0.03);
}

/* Status Badges */
.badge-enterprise {
  padding: 0.4em 0.6em;
  font-weight: 600;
  font-size: 0.75rem;
  border-radius: 0.25rem;
}

.badge-active { background-color: #e6f4ea; color: #1e8e3e; }
.badge-upcoming { background-color: #e8f0fe; color: #1a73e8; }
.badge-completed { background-color: #f8f9fa; color: #5f6368; }
.badge-absent { background-color: #fce8e6; color: #d93025; }
.badge-present { background-color: #e6f4ea; color: #1e8e3e; }

/* Timeline Component */
.timeline {
  position: relative;
  padding-left: 1.5rem;
  list-style: none;
  margin-bottom: 0;
}

.timeline::before {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  left: 6px;
  width: 2px;
  background-color: var(--border-color);
}

.timeline-item {
  position: relative;
  margin-bottom: 1.5rem;
}

.timeline-item:last-child {
  margin-bottom: 0;
}

.timeline-marker {
  position: absolute;
  top: 4px;
  left: -1.5rem;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background-color: white;
  border: 2px solid var(--primary-color);
  z-index: 1;
}

.timeline-marker.success { border-color: var(--success-color); }
.timeline-marker.warning { border-color: var(--warning-color); }
.timeline-marker.info { border-color: var(--info-color); }

.timeline-content {
  padding-bottom: 0.5rem;
}

.timeline-title {
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 0.25rem;
  color: var(--dark-text);
}

.timeline-time {
  font-size: 0.75rem;
  color: var(--secondary-color);
  display: block;
  margin-bottom: 0.25rem;
}

.timeline-desc {
  font-size: 0.85rem;
  color: #495057;
  margin-bottom: 0;
}

/* System Status Grid */
.system-status-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
}

.status-item {
  display: flex;
  align-items: center;
  padding: 1rem;
  border: 1px solid var(--border-color);
  border-radius: 0.375rem;
  background-color: var(--light-bg);
}

.status-indicator {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  margin-right: 1rem;
}

.status-indicator.online { background-color: var(--success-color); box-shadow: 0 0 0 3px rgba(25, 135, 84, 0.2); }
.status-indicator.offline { background-color: var(--danger-color); box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.2); }
.status-indicator.warning { background-color: var(--warning-color); box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.2); }

.status-info h6 {
  margin: 0 0 0.25rem 0;
  font-size: 0.9rem;
  font-weight: 600;
}

.status-info span {
  font-size: 0.75rem;
  color: var(--secondary-color);
}

/* Notification List */
.notification-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.notification-item {
  display: flex;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border-color);
}

.notification-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.notification-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 1rem;
  flex-shrink: 0;
  font-size: 0.9rem;
}

.notification-icon.bg-light-danger { background-color: #fce8e6; color: #d93025; }
.notification-icon.bg-light-warning { background-color: #fef7e0; color: #e37400; }
.notification-icon.bg-light-info { background-color: #e8f0fe; color: #1a73e8; }
.notification-icon.bg-light-success { background-color: #e6f4ea; color: #1e8e3e; }

.notification-content h6 {
  margin: 0 0 0.25rem 0;
  font-size: 0.9rem;
  font-weight: 600;
}

.notification-content p {
  margin: 0;
  font-size: 0.8rem;
  color: var(--secondary-color);
}

.notification-time {
  font-size: 0.7rem;
  color: #adb5bd;
  margin-top: 0.25rem;
  display: block;
}

/* Chart Placeholder */
.chart-placeholder {
  background-color: var(--light-bg);
  border: 1px dashed #ced4da;
  border-radius: 0.375rem;
  height: 250px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--secondary-color);
}

.chart-placeholder i {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: 0.5;
}

/* Utility Classes */
.bg-light-primary { background-color: rgba(13, 110, 253, 0.1); color: var(--primary-color); }
.bg-light-success { background-color: rgba(25, 135, 84, 0.1); color: var(--success-color); }
.bg-light-warning { background-color: rgba(255, 193, 7, 0.1); color: #b08a00; }
.bg-light-info { background-color: rgba(13, 202, 240, 0.1); color: #0a9dbe; }
.bg-light-danger { background-color: rgba(220, 53, 69, 0.1); color: var(--danger-color); }
.bg-light-secondary { background-color: rgba(108, 117, 125, 0.1); color: var(--secondary-color); }

/* Loader Overlay */
#dashboardLoader {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: rgba(255, 255, 255, 0.8);
  z-index: 1050;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}
</style>

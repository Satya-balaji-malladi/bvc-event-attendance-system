<div class="card h-100 border-0 shadow-sm module-card">
  <div class="card-header bg-white border-bottom-0 pt-4 px-4 d-flex justify-content-between align-items-center">
    <h5 class="fw-semibold mb-0">Events Management</h5>
    <button class="btn btn-primary" data-action="create-event"><i class="bi bi-calendar-plus me-2"></i>Create Event</button>
  </div>
  <div class="card-body p-4">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Event ID</th>
            <th>Event Name</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="events-table-body">
          <tr><td colspan="5" class="text-center text-muted py-5">No events found</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
